<script>
  try {
    firebase.initializeApp({ databaseURL: "https://rengaard-e82c6-default-rtdb.europe-west1.firebasedatabase.app" });
    const db = firebase.database();
    window.fbGet = async (key) => { const s = await db.ref(key).get(); return s.exists() ? s.val() : null; };
    window.fbSet = async (key, val) => { await db.ref(key).set(val); };
    window.fbOn = (key, cb) => {
      const ref = db.ref(key);
      ref.on("value", snap => cb(snap.exists() ? snap.val() : null));
      return () => ref.off("value");
    };
    window.firebaseReady = true;
  } catch(e) {
    console.error("Firebase init failed:", e);
    window.firebaseReady = false;
    window.fbGet = async () => null;
    window.fbSet = async () => {};
    window.fbOn = (key, cb) => () => {};
  }
</script>

// ── AVATAR SHOP ──
function AvatarShop({student,onUpdate,onBack}){
  const [tab,setTab]=useState("gender");
  const [msg,setMsg]=useState("");
  const purchased=student.purchased||[];
  const coins=student.coins||0;
  const avatar=student.avatar||{gender:"male",kit:"basic",hair:"short",extra:false};
  const isMale=(avatar.gender||"male")==="male";
  const kits=isMale?MALE_KITS:FEMALE_KITS;
  const hairs=isMale?MALE_HAIR:FEMALE_HAIR;
  const extraItem=isMale?ARMBAND:TIARA_ITEM;

  function buy(itemId,cost,type){
    if(coins<cost){setMsg("Ikke nok coins! 🪙");setTimeout(()=>setMsg(""),2000);return;}
    if(purchased.includes(itemId)){setMsg("Allerede kjøpt!");setTimeout(()=>setMsg(""),1500);return;}
    onUpdate({coins:coins-cost,purchased:[...purchased,itemId],avatar:{...avatar,[type]:type==="extra"?true:itemId}});
    setMsg(`✅ Kjøpt! -${cost} 🪙`);setTimeout(()=>setMsg(""),1500);
  }
  function equip(itemId,type){
    const isFree=type==="kit"?kits.find(k=>k.id===itemId)?.cost===0:type==="hair"?hairs.find(h=>h.id===itemId)?.cost===0:true;
    if(!isFree&&!purchased.includes(itemId))return;
    onUpdate({avatar:{...avatar,[type]:type==="extra"?!avatar.extra:itemId}});
  }
  function switchGender(g){
    onUpdate({avatar:{gender:g,kit:"basic",hair:g==="male"?"short":"long",extra:false}});
  }
  const Row=({icon,bg,label,owned,active,cost,onBuy,onEquip})=>(
    <div style={{background:"#fff",border:`2px solid ${active?"var(--purple)":"#eee"}`,borderRadius:14,padding:"12px 14px",display:"flex",alignItems:"center",gap:12,marginBottom:8}}>
      <div style={{width:40,height:40,borderRadius:"50%",background:bg||"#f5f5f5",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{icon}</div>
      <div style={{flex:1}}><div style={{fontWeight:500,fontSize:14}}>{label}</div><div style={{fontSize:12,color:"var(--text3)"}}>{owned?"Eid":"🪙 "+cost}</div></div>
      {owned?<button style={{...s.smallBtn2,background:active?"var(--purple)":"#f0f0f0",color:active?"#fff":"#333"}} onClick={onEquip}>{active?"På":"Bruk"}</button>
            :<button style={{...s.smallBtn2,background:"#f9a825",color:"#fff"}} onClick={onBuy}>Kjøp</button>}
    </div>
  );
  return(
    <div style={s.page}>
      <div style={s.topBar}><button style={s.back} onClick={onBack}>← Tilbake</button><span style={s.topTitle}>🛒 Butikk</span></div>
      <div style={{display:"flex",alignItems:"center",gap:16,background:"#fff",borderRadius:16,padding:"14px",marginBottom:14,border:"1px solid #eee"}}>
        <AvatarDisplay avatar={avatar} name={student.name} size={64} coins={coins} showCoins/>
        <div><div style={{fontWeight:500,fontSize:15}}>{student.name}</div><div style={{fontSize:14,color:"#f9a825",fontWeight:500}}>🪙 {coins} coins</div></div>
      </div>
      {msg&&<div style={{background:"#e8f5e9",borderRadius:10,padding:"10px 14px",marginBottom:10,fontSize:14,fontWeight:500,color:"#2e7d32"}}>{msg}</div>}

// ── PENALTY ──
function PenaltyGame({onDone}){
  const [phase,setPhase]=useState("aim");
  const [target,setTarget]=useState({x:50,y:50});
  const [scored,setScored]=useState(null);
  const [shots,setShots]=useState([]);
  const [current,setCurrent]=useState(0);
  const TOTAL=5;
  function shoot(){
    if(phase!=="aim")return;
    const keeperX=Math.random()>0.5?20:80;
    const hit=Math.abs(target.x-keeperX)>25||target.y<30;
    setPhase("flying");
    setTimeout(()=>{const ns=[...shots,hit];setShots(ns);setScored(hit);setPhase("result");setTimeout(()=>{if(current+1>=TOTAL){onDone(ns.filter(Boolean).length);}else{setCurrent(c=>c+1);setScored(null);setPhase("aim");setTarget({x:50,y:50});}},1200);},800);
  }
  return(
    <div style={{textAlign:"center",padding:"16px 0"}}>
      <div style={{fontSize:13,fontWeight:500,marginBottom:10}}>Skytt {current+1} av {TOTAL} · Mål: {shots.filter(Boolean).length}</div>
      <div style={{position:"relative",width:"100%",maxWidth:320,margin:"0 auto",height:180,background:"linear-gradient(180deg,#90ee90,#228b22)",borderRadius:12,overflow:"hidden",cursor:phase==="aim"?"crosshair":"default",border:"2px solid #555"}}
        onClick={e=>{if(phase!=="aim")return;const r=e.currentTarget.getBoundingClientRect();setTarget({x:((e.clientX-r.left)/r.width)*100,y:((e.clientY-r.top)/r.height)*100});}}>
        <div style={{position:"absolute",top:10,left:"15%",width:"70%",height:"55%",border:"4px solid white",borderBottom:"none",pointerEvents:"none"}}/>
        {phase==="aim"&&<div style={{position:"absolute",left:`${target.x}%`,top:`${target.y}%`,transform:"translate(-50%,-50%)",fontSize:22,pointerEvents:"none"}}>⚽</div>}
        {phase==="result"&&scored!==null&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",background:scored?"rgba(0,180,0,0.5)":"rgba(200,0,0,0.5)",fontSize:32}}>{scored?"⚽ MÅL!":"❌ Reddet!"}</div>}
        {phase==="aim"&&<div style={{position:"absolute",bottom:6,width:"100%",textAlign:"center",fontSize:11,color:"rgba(255,255,255,0.8)"}}>Trykk der du vil skyte</div>}
      </div>
      {phase==="aim"&&<button style={{...s.bigBtn,marginTop:14,background:"#e53935"}} onClick={shoot}>🦵 Skyt!</button>}
      <div style={{display:"flex",justifyContent:"center",gap:8,marginTop:10}}>
        {Array(TOTAL).fill(0).map((_,i)=><span key={i} style={{fontSize:18}}>{i<shots.length?(shots[i]?"⚽":"❌"):"⬜"}</span>)}
      </div>
    </div>
  );
}

function openPack(packType) {
  const pool = PLAYERS.filter(p => p.rating >= packType.minRating);
  const result = [];
  for (let i = 0; i < packType.count; i++) {
    result.push(pool[Math.floor(Math.random() * pool.length)]);
  }
  return result;
}

function PackStore({student, onUpdate, onBack}) {
  const [phase, setPhase] = useState("store"); // store | opening | reveal
  const [selectedPack, setSelectedPack] = useState(null);
  const [revealedPlayers, setRevealedPlayers] = useState([]);
  const [revealIdx, setRevealIdx] = useState(0);
  const [msg, setMsg] = useState("");
  const coins = student.coins || 0;
  const ownedIds = student.playerCards || [];

  function buyPack(pack) {
    if (coins < pack.price) { setMsg("Ikke nok coins! 🪙"); setTimeout(()=>setMsg(""),2000); return; }
    const players = openPack(pack);
    onUpdate({ coins: coins - pack.price });
    setSelectedPack(pack);
    setRevealedPlayers(players);
    setRevealIdx(0);
    setPhase("opening");
  }

  function revealNext() {
    const p = revealedPlayers[revealIdx];
    // Add to collection if not already owned
    const existing = student.playerCards || [];
    if (!existing.includes(p.id)) {
      onUpdate({ playerCards: [...existing, p.id] });
    }
    if (revealIdx + 1 >= revealedPlayers.length) {
      setPhase("reveal");
    } else {
      setRevealIdx(i => i + 1);
    }
  }

  if (phase === "opening") {
    const current = revealedPlayers[revealIdx];
    return (
      <div style={s.page}>
        <div style={{textAlign:"center",padding:"20px 0"}}>
          <div style={{fontSize:14,color:"var(--text3)",marginBottom:4}}>{selectedPack.label} · Kort {revealIdx+1} av {revealedPlayers.length}</div>
          <div style={{fontSize:22,fontWeight:800,marginBottom:20}}>🎴 Hvem får du?</div>
          <div style={{display:"flex",justifyContent:"center",marginBottom:24}}>
            <PlayerCard player={current} size="normal"/>
          </div>
          <div style={{fontSize:13,color:"var(--text2)",marginBottom:16}}>
            {(student.playerCards||[]).includes(current.id) ? "⚠️ Allerede i samlingen din" : "🆕 Ny spiller!"}
          </div>
          <button style={s.bigBtn} onClick={revealNext}>
            {revealIdx + 1 < revealedPlayers.length ? "Neste kort ▶" : "Se alle ✓"}
          </button>
        </div>
      </div>
    );
  }

  if (phase === "reveal") {
    return (
      <div style={s.page}>
        <div style={{textAlign:"center",padding:"16px 0 8px"}}>
          <div style={{fontSize:40}}>🎉</div>
          <div style={{fontSize:20,fontWeight:800,margin:"8px 0"}}>Pakke åpnet!</div>
        </div>
        <div style={{display:"flex",gap:10,justifyContent:"center",marginBottom:20,flexWrap:"wrap"}}>
          {revealedPlayers.map((p,i) => <PlayerCard key={i} player={p} size="normal"/>)}
        </div>
        <button style={s.bigBtn} onClick={()=>setPhase("store")}>Kjøp flere pakker</button>
        <button style={{...s.bigBtn,...s.btnGray,marginTop:10}} onClick={onBack}>Tilbake</button>
      </div>
    );
  }

  return (
    <div style={s.page}>
      <div style={s.topBar}><button style={s.back} onClick={onBack}>← Tilbake</button><span style={s.topTitle}>🎴 Spillerpakker</span></div>
      <div style={{background:"linear-gradient(135deg,#1a237e,#283593)",borderRadius:16,padding:"12px 16px",marginBottom:16,display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:24}}>🪙</span>
        <div><div style={{color:"white",fontWeight:800,fontSize:16}}>{coins} coins</div><div style={{color:"rgba(255,255,255,0.7)",fontSize:12}}>{ownedIds.length} spillere i samlingen</div></div>
      </div>
      {msg&&<div style={{background:"#ffcdd2",borderRadius:10,padding:"10px",marginBottom:10,fontSize:14,fontWeight:700,color:"#c62828",textAlign:"center"}}>{msg}</div>}
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {PACK_TYPES.map(pack => (
          <div key={pack.id} style={{background:pack.bg,borderRadius:18,padding:"16px",boxShadow:"0 4px 16px rgba(0,0,0,0.15)"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
              <div><div style={{fontWeight:800,fontSize:18,color:"#fff"}}>{pack.label}</div><div style={{fontSize:12,color:"rgba(255,255,255,0.8)"}}>{pack.desc}</div></div>
              <div style={{textAlign:"right"}}><div style={{fontSize:22,fontWeight:900,color:"#fff"}}>🪙 {pack.price}</div></div>
            </div>
            <button onClick={()=>buyPack(pack)} style={{width:"100%",padding:"12px",borderRadius:12,border:"none",background:"rgba(255,255,255,0.25)",color:"#fff",fontSize:15,fontWeight:800,cursor:"pointer",backdropFilter:"blur(4px)"}}>
              {coins >= pack.price ? "🎴 Åpne pakke!" : "🔒 Ikke nok coins"}
            </button>

        ))}
      </div>
      <div style={{fontSize:13,fontWeight:700,color:"var(--text2)",margin:"20px 0 10px"}}>Din samling ({ownedIds.length} spillere)</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>

function HangmanGame({gloser,onBack,onCorrect}){
  const [deck]=useState(()=>shuffle(gloser));
  const [idx,setIdx]=useState(0);
  const [guessed,setGuessed]=useState(new Set());
  const [score,setScore]=useState(0);
  const [done,setDone]=useState(false);
  const word=deck[idx]?.en||"",hint=deck[idx]?.no||"";
  const letters=word.split("");
  const wrong=[...guessed].filter(l=>!letters.includes(l));
  const wrongCount=wrong.length,won=letters.every(l=>guessed.has(l)),lost=wrongCount>=MAX_WRONG,finished=won||lost;
  function guess(l){
    if(finished||guessed.has(l))return;
    const nx=new Set(guessed);nx.add(l);setGuessed(nx);
    if(letters.every(c=>nx.has(c))){setScore(sc=>sc+1);onCorrect&&onCorrect();}
  }
  function next(){if(idx+1>=deck.length){setDone(true);return;}setIdx(i=>i+1);setGuessed(new Set());}
  const alpha="abcdefghijklmnopqrstuvwxyz".split("");
  if(done)return(<div style={s.page}><div style={s.resultBox}><div style={{fontSize:64}}>{score===deck.length?"🏆":score>=deck.length*0.6?"🌟":"💪"}</div><div style={s.resultTitle}>Ferdig!</div><div style={s.resultScore}>{score} av {deck.length}!</div><div style={{fontSize:16,color:"#f9a825",fontWeight:500}}>+{score} 🪙</div><button style={s.bigBtn} onClick={()=>{setIdx(0);setGuessed(new Set());setScore(0);setDone(false);}}>Prøv igjen</button><button style={{...s.bigBtn,...s.btnGray}} onClick={onBack}>Hjem</button></div></div>);
  return(
    <div style={s.page}>
      <div style={s.topBar}><button style={s.back} onClick={onBack}>← Hjem</button><span style={s.topTitle}>Hangman</span><span style={{fontSize:14,fontWeight:500}}>⭐{score}</span></div>
      <div style={s.progress}>{idx+1}/{deck.length}</div>
      <div style={{display:"flex",justifyContent:"center",marginBottom:4}}>
        <svg viewBox="0 0 120 130" width="120" height="130">
          <line x1="10" y1="125" x2="110" y2="125" stroke="#555" strokeWidth="3" strokeLinecap="round"/>
          <line x1="30" y1="125" x2="30" y2="10" stroke="#555" strokeWidth="3" strokeLinecap="round"/>
          <line x1="30" y1="10" x2="75" y2="10" stroke="#555" strokeWidth="3" strokeLinecap="round"/>
          <line x1="75" y1="10" x2="75" y2="25" stroke="#555" strokeWidth="3" strokeLinecap="round"/>
          {wrongCount>=1&&<circle cx="75" cy="33" r="8" stroke="#e53935" strokeWidth="2.5" fill="none"/>}
          {wrongCount>=2&&<><line x1="75" y1="41" x2="75" y2="70" stroke="#e53935" strokeWidth="2.5" strokeLinecap="round"/><line x1="75" y1="50" x2="58" y2="62" stroke="#e53935" strokeWidth="2.5" strokeLinecap="round"/><line x1="75" y1="50" x2="92" y2="62" stroke="#e53935" strokeWidth="2.5" strokeLinecap="round"/></>}
          {wrongCount>=3&&<><line x1="75" y1="70" x2="62" y2="88" stroke="#e53935" strokeWidth="2.5" strokeLinecap="round"/><line x1="75" y1="70" x2="88" y2="88" stroke="#e53935" strokeWidth="2.5" strokeLinecap="round"/></>}
        </svg>
      </div>
      <div style={{textAlign:"center",fontSize:13,color:"var(--text2)",marginBottom:6}}>Norsk: <strong>{hint}</strong></div>
      <div style={{display:"flex",justifyContent:"center",gap:6,flexWrap:"wrap",margin:"8px 0 14px"}}>
        {letters.map((l,i)=><div key={i} style={s.letterBox}>{guessed.has(l)?<span style={{fontSize:20,fontWeight:500}}>{l}</span>:<span style={{color:"#ddd"}}>_</span>}</div>)}
      </div>
      {wrong.length>0&&<div style={{textAlign:"center",fontSize:12,color:"#e57373",marginBottom:6}}>Feil: {wrong.join("  ")} ({MAX_WRONG-wrongCount} igjen)</div>}
      {finished?(
        <div style={{textAlign:"center",marginBottom:14}}>
          {won?<div style={{fontSize:20,color:"#43a047",fontWeight:500}}>🎉 Bra!</div>:<div style={{fontSize:15,color:"#e53935"}}>Ordet var: <strong>{word}</strong></div>}
          <button style={{...s.bigBtn,marginTop:12}} onClick={next}>{idx+1<deck.length?"Neste ▶":"Ferdig"}</button>
        </div>
      ):(
        <div style={s.keyboard}>
          {alpha.map(l=><button key={l} style={{...s.key,background:guessed.has(l)?(letters.includes(l)?"#c8e6c9":"#ffcdd2"):"#f5f5f5",color:guessed.has(l)?"#999":"#222",cursor:guessed.has(l)?"default":"pointer"}} onClick={()=>guess(l)}>{l}</button>)}
        </div>
      )}
    </div>
  );
}

function MathGame({onBack,addCoins,mode}){
  const [score,setScore]=useState(0);
  const [q,setQ]=useState(null);
  const [chosen,setChosen]=useState(null);
  const [done,setDone]=useState(false);
  const [round,setRound]=useState(0);
  const TOTAL=10;
  function newQ(){
    let a,b,answer,op;
    if(mode==="multiply"){a=Math.floor(Math.random()*10)+1;b=Math.floor(Math.random()*10)+1;answer=a*b;op="×";}
    else if(mode==="add"){a=Math.floor(Math.random()*20)+1;b=Math.floor(Math.random()*20)+1;answer=a+b;op="+";}
    else{a=Math.floor(Math.random()*20)+10;b=Math.floor(Math.random()*a)+1;answer=a-b;op="−";}
    const wrong=new Set();
    while(wrong.size<3){let w=answer+(Math.floor(Math.random()*8)-4);if(w!==answer&&w>0)wrong.add(w);}
    setQ({a,b,answer,op,choices:shuffle([answer,...wrong])});setChosen(null);
  }
  useEffect(()=>{newQ();},[]);
  function pick(val){
    if(chosen!==null)return;setChosen(val);
    if(val===q.answer){setScore(sc=>sc+1);addCoins(1);}
    setTimeout(()=>{if(round+1>=TOTAL)setDone(true);else{setRound(r=>r+1);newQ();}},900);
  }
  const colors={multiply:"#e0f7fa",add:"#e8f5e9",subtract:"#fff3e0"};
  const titles={multiply:"✖️ Ganging",add:"➕ Addisjon",subtract:"➖ Subtraksjon"};
  if(done)return(<div style={s.page}><div style={s.resultBox}><div style={{fontSize:64}}>{score>=9?"🏆":score>=6?"🌟":"💪"}</div><div style={s.resultTitle}>Ferdig!</div><div style={s.resultScore}>{score} av {TOTAL}</div><div style={{fontSize:16,color:"#f9a825",fontWeight:500}}>+{score} 🪙</div><button style={s.bigBtn} onClick={()=>{setScore(0);setRound(0);setDone(false);newQ();}}>Prøv igjen</button><button style={{...s.bigBtn,...s.btnGray}} onClick={onBack}>Hjem</button></div></div>);
  if(!q)return null;
  return(
    <div style={s.page}>
      <div style={s.topBar}><button style={s.back} onClick={onBack}>← Hjem</button><span style={s.topTitle}>{titles[mode]}</span><span style={{fontSize:14,fontWeight:500}}>⭐{score}</span></div>
      <div style={s.progress}>{round+1}/{TOTAL}</div>
      <div style={{background:colors[mode],borderRadius:20,padding:"36px 24px",textAlign:"center",marginBottom:20}}>
        <div style={{fontSize:13,color:"var(--text3)",marginBottom:6}}>Hva er?</div>
        <div style={{fontSize:50,fontWeight:500}}>{q.a} {q.op} {q.b} = ?</div>
      </div>
      <div style={s.choicesGrid}>
        {q.choices.map((c,i)=>{let bg="#fff";if(chosen!==null){if(c===q.answer)bg="#d4f7d4";else if(c===chosen)bg="#fdd";}return<button key={i} style={{...s.choice,background:bg,fontSize:26,fontWeight:500,padding:"20px 8px"}} onClick={()=>pick(c)}>{c}</button>;})}
      </div>
    </div>
  );
}

function getDailyFlags() {
  const seed = Math.floor(Date.now() / 86400000);
  const shuffled = [...FLAGS].sort((a,b) => {
    const ha = (seed * 1103515245 + a.code.charCodeAt(0) * 12345) & 0x7fffffff;
    const hb = (seed * 1103515245 + b.code.charCodeAt(0) * 12345) & 0x7fffffff;
    return ha - hb;
  });
  return shuffled.slice(0, 20);
}

function FlagImg({code, size=90}) {

}

function FlagQuiz({onBack, addCoins, onDone}) {
  const [deck] = useState(() => getDailyFlags());
  const [idx, setIdx] = useState(0);
  const [chosen, setChosen] = useState(null);
  const [score, setScore] = useState(0);
  const [done, setDone] = useState(false);
  const [choices, setChoices] = useState([]);

  function makeChoices(i) {
    const correct = deck[i];
    const others = shuffle(FLAGS.filter(f => f.code !== correct.code)).slice(0, 3);
    setChoices(shuffle([correct, ...others]));
    setChosen(null);
  }

  useEffect(() => { makeChoices(0); }, []);

  function pick(flag) {
    if (chosen) return;
    setChosen(flag.code);
    const correct = flag.code === deck[idx].code;
    if (correct) { setScore(s => s + 1); addCoins(1); }
    setTimeout(() => {
      if (idx + 1 >= deck.length) { onDone&&onDone(); setDone(true); }
      else { setIdx(i => { makeChoices(i + 1); return i + 1; }); }
    }, 1000);
  }

  if (done) return (
    <div style={s.page}><div style={s.resultBox}>
      <div style={{fontSize:64}}>{score >= 18 ? "🏆" : score >= 12 ? "🌟" : "💪"}</div>
      <div style={s.resultTitle}>Flaggquiz ferdig!</div>
      <div style={s.resultScore}>{score} av {deck.length} riktige</div>
      <div style={{fontSize:16,color:"#f9a825",fontWeight:500}}>+{score} 🪙 coins!</div>
      <div style={{fontSize:13,color:"var(--text3)",marginTop:4}}>Nye flagg i morgen!</div>
      <button style={{...s.bigBtn,...s.btnGray}} onClick={onBack}>Hjem</button>
    </div></div>
  );

  const current = deck[idx];
  return (
    <div style={s.page}>
      <div style={s.topBar}><button style={s.back} onClick={onBack}>← Hjem</button><span style={s.topTitle}>🌍 Flaggquiz</span><span style={{fontSize:14,fontWeight:500}}>⭐{score}</span></div>
      <div style={s.progress}>{idx+1} / {deck.length}</div>

      <div style={{textAlign:"center",marginBottom:20}}>
        <div style={{fontSize:13,color:"var(--text3)",marginBottom:12}}>Hvilket land er dette?</div>
        <FlagImg code={current.code} size={90}/>
      </div>

      <div style={s.choicesGrid}>
        {choices.map((f,i) => {
          let bg = "#fff", border = "1px solid #ddd";
          if (chosen) {
            if (f.code === current.code) { bg = "#d4f7d4"; border = "2px solid #43a047"; }
            else if (f.code === chosen) { bg = "#fdd"; border = "2px solid #e53935"; }
          }
          return (
            <button key={i} style={{...s.choice, background:bg, border, fontSize:14, padding:"14px 8px"}}
              onClick={() => pick(f)}>
              {f.name}
            </button>
          );
        })}
      </div>
    </div>
  );
}

      <div style={{display:"flex",gap:8,fontSize:12,color:"var(--text3)",marginBottom:14,flexWrap:"wrap"}}><span>✅ kan</span><span>🔶 nesten</span><span>❌ trenger øving</span><span>⬜ ikke øvd</span></div>

// ── ADMIN ──
function AdminPanel({students,gloser,onSaveStudents,onSaveGloser,onBack}){
  const [tab,setTab]=useState("students");
  const [name,setName]=useState("");
  const [pinVal,setPinVal]=useState("");
  const [msg,setMsg]=useState("");
  const [newNo,setNewNo]=useState("");
  const [newEn,setNewEn]=useState("");
  const [addMsg,setAddMsg]=useState("");
  const [translating,setTranslating]=useState(false);
  const [nextSId,setNextSId]=useState(()=>Math.max(...students.map(s=>s.id),0)+1);
  const [nextGId,setNextGId]=useState(()=>Math.max(...gloser.map(g=>g.id),0)+1);

  function addStudent(){
    if(!name.trim()||!/^\d{4}$/.test(pinVal)){setMsg("Skriv navn og 4-sifret PIN.");return;}
    if(students.find(s=>s.pin===pinVal)){setMsg("PIN allerede i bruk.");return;}
    const ns=[...students,{id:nextSId,name:name.trim(),pin:pinVal,history:[],quizSessions:0,hangmanSessions:0,flashcardSessions:0,mathSessions:0,points:0,coins:0,squad:[],club:CLUBS[nextSId%CLUBS.length],avatar:{gender:"male",kit:"basic",hair:"short",extra:false},purchased:[]}];
    onSaveStudents(ns);setNextSId(n=>n+1);setName("");setPinVal("");setMsg("✅ Lagt til!");setTimeout(()=>setMsg(""),1500);
  }
  function translateWord(w){
    if(!w.trim()){setNewEn("");return;}
    const hit=dict[w.trim().toLowerCase()];
    setNewEn(hit||"");
    if(!hit){setAddMsg("Ikke funnet – skriv engelsk selv");setTimeout(()=>setAddMsg(""),2000);}
  }
  function addGlose(){
    if(!newNo.trim()||!newEn.trim())return;
    const ng=[...gloser,{no:newNo.trim().toLowerCase(),en:newEn.trim().toLowerCase(),id:nextGId}];
    onSaveGloser(ng);setNextGId(n=>n+1);setNewNo("");setNewEn("");setAddMsg("✅ Lagt til!");setTimeout(()=>setAddMsg(""),1500);
  }
  return(
    <div style={s.page}>
      <div style={s.topBar}><button style={s.back} onClick={onBack}>← Logg ut</button><span style={s.topTitle}>Admin</span></div>
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        {["students","gloser","report"].map(t=><button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:"9px",borderRadius:10,border:"1px solid",borderColor:tab===t?"var(--purple)":"#ddd",background:tab===t?"var(--purple-light)":"#fafafa",color:tab===t?"var(--purple-dark)":"#555",fontWeight:tab===t?500:400,cursor:"pointer",fontSize:13}}>{t==="students"?"👤 Elever":t==="gloser"?"📚 Gloser":"📋 Rapport"}</button>)}
      </div>
      {tab==="students"&&<>
        <div style={s.addBox}>
          <input style={s.input} placeholder="Elevnavn" value={name} onChange={e=>setName(e.target.value)}/>
          <input style={s.input} placeholder="PIN (4 siffer)" value={pinVal} maxLength={4} onChange={e=>setPinVal(e.target.value.replace(/\D/g,""))}/>
          <button style={s.bigBtn} onClick={addStudent}>Legg til elev +</button>
          {msg&&<div style={{color:msg.startsWith("✅")?"green":"#e53935",fontWeight:500}}>{msg}</div>}
        </div>
        <div style={s.gloseList}>
          {students.map(st=><div key={st.id} style={s.gloseRow}><AvatarDisplay avatar={st.avatar} name={st.name} size={34}/><span style={{flex:1,fontSize:14,marginLeft:8}}>{st.name} <span style={{color:"#bbb",fontSize:11}}>PIN:{st.pin}</span></span><span style={{fontSize:12,color:"#f9a825",marginRight:8}}>🪙{st.coins||0}</span><button style={s.deleteBtn} onClick={()=>onSaveStudents(students.filter(s=>s.id!==st.id))}>✕</button></div>)}
        </div>
      </>}
      {tab==="gloser"&&<>
        <div style={s.addBox}>
          <input style={s.input} placeholder="🇳🇴 Skriv norsk ord..." value={newNo} onChange={e=>setNewNo(e.target.value)} onBlur={e=>translateWord(e.target.value)}/>
          <div style={{position:"relative"}}>
            <input style={{...s.input,width:"100%"}} placeholder="🇬🇧 Engelsk (forslag automatisk)" value={newEn} onChange={e=>setNewEn(e.target.value)}/>
          </div>
          {newEn&&<div style={{background:"#e8f5e9",borderRadius:10,padding:"10px 14px",fontSize:14,display:"flex",alignItems:"center",gap:10}}><span style={{flex:1}}>Forslag: <strong>{newEn}</strong></span><button style={{background:"none",border:"none",fontSize:13,color:"#e65100",cursor:"pointer"}} onClick={()=>setNewEn("")}>Endre</button></div>}
          <button style={{...s.bigBtn,opacity:(!newNo.trim()||!newEn.trim())?0.5:1}} onClick={addGlose}>Legg til glose +</button>
          {addMsg&&<div style={{color:addMsg.startsWith("✅")?"green":"#e65100",fontWeight:500}}>{addMsg}</div>}
        </div>
        <div style={s.gloseList}>
          {[...gloser].sort((a,b)=>b.id-a.id).map((g,i)=><div key={g.id} style={s.gloseRow}>{i<NEW_COUNT&&<span style={{fontSize:10,background:"#fff3e0",color:"#e65100",borderRadius:4,padding:"1px 5px",marginRight:6}}>NY</span>}<span style={s.glosePair}>{g.no} <span style={{color:"#aaa"}}>→</span> {g.en}</span><button style={s.deleteBtn} onClick={()=>onSaveGloser(gloser.filter(x=>x.id!==g.id))}>✕</button></div>)}
        </div>
      </>}
      {tab==="report"&&<TeacherReport gloser={gloser} students={students} onBack={()=>setTab("students")}/>}
    </div>
  );
}

// ── PIN PAD ──
function PinPad({title,subtitle,onSubmit,error,onBack}){
  const [pin,setPin]=useState("");
  function press(d){if(pin.length>=4)return;const n=pin+d;setPin(n);if(n.length===4){setTimeout(()=>{onSubmit(n);setPin("");},120);}}
  return(
    <div style={{maxWidth:340,margin:"0 auto",padding:"32px 16px",textAlign:"center"}}>
      {onBack&&<button style={s.back} onClick={onBack}>← Tilbake</button>}
      <div style={{paddingTop:onBack?16:0}}>
        <div style={{fontSize:40,marginBottom:8}}>🎓</div>
        <div style={{fontSize:20,fontWeight:500}}>{title}</div>
        {subtitle&&<div style={{fontSize:13,color:"var(--text2)",marginTop:4}}>{subtitle}</div>}
        <div style={{display:"flex",justifyContent:"center",gap:12,margin:"24px 0 8px"}}>
          {[0,1,2,3].map(i=><div key={i} style={{width:18,height:18,borderRadius:"50%",background:pin.length>i?"var(--purple)":"#e0e0e0",transition:"background 0.15s"}}/>)}
        </div>
        {error&&<div style={{fontSize:12,color:"#e53935",margin:"6px 0"}}>{error}</div>}
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginTop:20}}>
          {[1,2,3,4,5,6,7,8,9].map(d=><button key={d} style={s.pinBtn} onClick={()=>press(String(d))}>{d}</button>)}
          <div/><button style={s.pinBtn} onClick={()=>press("0")}>0</button>
          <button style={{...s.pinBtn,color:"var(--text3)"}} onClick={()=>setPin(p=>p.slice(0,-1))}>⌫</button>
        </div>
      </div>
    </div>
  );
}

// ── MAIN ──
function App(){
  const [students,setStudentsState]=useState(defaultStudents);
  const [gloser,setGloserState]=useState(defaultGloser);
  const [loaded,setLoaded]=useState(false);
  const [currentUser,setCurrentUser]=useState(null);
  const [loginError,setLoginError]=useState("");
  const [selecting,setSelecting]=useState(null);
  const [screen,setScreen]=useState("home");
  const [quizDeck,setQuizDeck]=useState([]);
  const [quizIdx,setQuizIdx]=useState(0);
  const [quizChoices,setQuizChoices]=useState([]);
  const [quizAnswer,setQuizAnswer]=useState(null);
  const [quizScore,setQuizScore]=useState(0);
  const [quizDone,setQuizDone]=useState(false);
  const [fcDeck,setFcDeck]=useState([]);
  const [fcIdx,setFcIdx]=useState(0);
  const [fcFlipped,setFcFlipped]=useState(false);
  const [fcDir,setFcDir]=useState("no→en");
  const [showPenalty,setShowPenalty]=useState(false);
  const [penaltyResult,setPenaltyResult]=useState(null);
  const [mathMultiplySessions,setMathMultiplySessions]=useState(0);
  const [mathAddSessions,setMathAddSessions]=useState(0);
  const [mathSubtractSessions,setMathSubtractSessions]=useState(0);
  const [flagSessions,setFlagSessions]=useState(0);
  const [coinAnim,setCoinAnim]=useState(null);

  useEffect(()=>{
    async function load(){
      const gg = await dbGet("gloser");
      if (gg) {
        const arr = Array.isArray(gg) ? gg.filter(Boolean) : Object.values(gg).filter(Boolean);
        setGloserState(arr);
      }
      setLoaded(true);
    }
    load();

    // Real-time listener for students — keyed by id
    let unsub = null;
    try {
      unsub = window.fbOn("glose/students", (val) => {
        if (val) {
          // val is object like {"1": {...}, "2": {...}}
          const arr = Object.values(val).filter(v => v && v.id);
          setStudentsState(arr);
        }
      });
    } catch(e) { console.error("fbOn failed", e); }

    return () => { if (unsub) unsub(); };
  },[]);

  async function saveStudents(ns) {
    const clean = ns.filter(Boolean);
    setStudentsState(clean);
    const obj = {};
    clean.forEach(s => { if(s?.id) obj[s.id] = s; });
    await dbSet("students", obj);
  }

  async function saveGloser(ng) {
    const clean = ng.filter(Boolean);
    setGloserState(clean);
    const obj = {};
    clean.forEach(g => { if(g?.id) obj[g.id] = g; });
    await dbSet("gloser", obj);
  }

  async function updateStudent(id, updates) {
    const current = students.find(s => s.id === id) || {};
    const merged = {...current, ...updates};
    // Update local state immediately
    setStudentsState(prev => prev.map(st => st.id !== id ? st : merged));
    if (currentUser && currentUser.id === id) setCurrentUser(u => ({...u, ...updates}));
    // Write to Firebase
    try { await window.fbSet("glose/students/" + id, merged); } catch(e) { console.error("Firebase write failed:", e); }
  }

  function addCoins(c){
    if(!c||!currentUser||currentUser==="admin")return;
    setCoinAnim(`+${c} 🪙`);setTimeout(()=>setCoinAnim(null),1500);
    const st=students.find(s=>s.id===currentUser.id);if(!st)return;
    const np=(st.points||0)+c,nc=(st.coins||0)+c;
    const os=Math.floor((st.points||0)/3),ns2=Math.floor(np/3);
    const sq=[...(st.squad||[])];
    for(let i=os;i<ns2&&sq.length<11;i++)sq.push(`p_${Date.now()}_${i}`);
    updateStudent(currentUser.id,{points:np,coins:nc,squad:sq});
  }

  function recordHistory(en,correct,source){
    const st=students.find(s=>s.id===currentUser?.id);if(!st)return;
    updateStudent(currentUser.id,{history:[...(st.history||[]),{en,correct,source}]});
  }

  if(!loaded)return(<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",gap:12}}><div style={{fontSize:48}}>🎓</div><div style={{fontSize:16,color:"var(--text2)"}}>Laster...</div></div>);

  if(!currentUser){
    if(!selecting)return(
      <div style={{maxWidth:380,margin:"0 auto",padding:"32px 16px",textAlign:"center"}}>
        <div style={{fontSize:64,animation:"bounce 1.5s infinite"}}>🎓</div>
        <div style={{fontSize:26,fontWeight:800,marginTop:8,background:"linear-gradient(135deg,#7c4dff,#448aff)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Glose-appen</div>
        <div style={{fontSize:14,color:"var(--text2)",marginTop:4,marginBottom:24}}>Hvem er du? 👇</div>
        <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:20}}>
          {students.map((st,i)=>{
            const colors=["linear-gradient(135deg,#bbdefb,#90caf9)","linear-gradient(135deg,#e1bee7,#ce93d8)","linear-gradient(135deg,#c8e6c9,#a5d6a7)","linear-gradient(135deg,#ffcdd2,#ef9a9a)","linear-gradient(135deg,#fff9c4,#fff176)","linear-gradient(135deg,#ffe0b2,#ffcc80)"];
            return(
              <button key={st.id} style={{padding:"14px 18px",borderRadius:20,border:"none",background:colors[i%colors.length],fontSize:16,cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:12,boxShadow:"0 4px 12px rgba(0,0,0,0.08)",fontWeight:600}} onClick={()=>{setSelecting(st);setLoginError("");}}>
                <AvatarDisplay avatar={st.avatar} name={st.name} size={46}/>
                <div><div style={{fontWeight:700}}>{st.name}</div><div style={{fontSize:11,color:"#555"}}>{(st.club||CLUBS[0]).name} · 🪙{st.coins||0}</div></div>
              </button>
            );
          })}
        </div>
        <button style={{width:"100%",padding:"12px",borderRadius:14,border:"none",background:"#ede7f6",color:"#7c4dff",fontSize:14,cursor:"pointer",fontWeight:700}} onClick={()=>{setSelecting("admin");setLoginError("");}}>🔒 Admin / Lærer</button>
      </div>
    );
    if(selecting==="admin")return<PinPad title="Admin" subtitle="Admin PIN" error={loginError} onBack={()=>{setSelecting(null);setLoginError("");}} onSubmit={p=>{if(p===ADMIN_PIN){setCurrentUser("admin");setSelecting(null);setLoginError("");}else setLoginError("Feil PIN.");}}/>;
    return<PinPad title={selecting.name} subtitle="PIN-kode" error={loginError} onBack={()=>{setSelecting(null);setLoginError("");}} onSubmit={p=>{if(p===selecting.pin){setCurrentUser(selecting);setSelecting(null);setLoginError("");setScreen("home");}else setLoginError("Feil PIN.");}}/>;
  }

  if(currentUser==="admin")return<AdminPanel students={students} gloser={gloser} onSaveStudents={saveStudents} onSaveGloser={saveGloser} onBack={()=>setCurrentUser(null)}/>;

  const stData=students.find(s=>s.id===currentUser.id)||currentUser;
  const club=stData.club||CLUBS[0];

  if(showPenalty)return(<div style={s.page}><div style={{textAlign:"center",padding:"18px 0 8px"}}><div style={{fontSize:24,fontWeight:500}}>⚽ Straffespark!</div></div><PenaltyGame onDone={goals=>{const bonus=goals*2;addCoins(quizScore+bonus);setPenaltyResult({goals,bonus});setShowPenalty(false);}}/></div>);

  if(penaltyResult)return(
    <div style={s.page}><div style={s.resultBox}>
      <AvatarDisplay avatar={stData.avatar} name={stData.name} size={80} coins={stData.coins} showCoins/>
      <div style={s.resultTitle}>Økt ferdig!</div>
      <div style={{fontSize:22,fontWeight:500,color:"#f9a825"}}>+{quizScore+penaltyResult.bonus} 🪙</div>
      <button style={s.bigBtn} onClick={()=>{setPenaltyResult(null);setScreen("shop");}}>🛒 Til butikken!</button>
      <button style={{...s.bigBtn,...s.btnGray}} onClick={()=>{setPenaltyResult(null);setScreen("home");}}>Hjem</button>
    </div></div>
  );

  if(screen==="flags")return<FlagQuiz onBack={()=>setScreen("home")} addCoins={addCoins}/>;
  if(screen==="hangman")return<HangmanGame gloser={gloser} onBack={()=>{
    const st=getStudent();
    updateStudent(currentUser.id,{hangmanSessions:(st.hangmanSessions||0)+1});
    setScreen("home");
  }} onCorrect={()=>addCoins(1)}/>;
  if(screen==="leaderboard")return<Leaderboard students={students} onBack={()=>setScreen("home")}/>;
  if(screen==="shop")return<AvatarShop student={stData} onUpdate={u=>updateStudent(stData.id,u)} onBack={()=>setScreen("home")}/>;
  if(screen==="report")return<TeacherReport gloser={gloser} students={students} singleStudent={stData.id} onBack={()=>setScreen("home")}/>;
  if(screen==="maths")return<MathMenu onBack={()=>setScreen("home")} addCoins={addCoins} onStart={()=>updateStudent(currentUser.id,{mathSessions:(stData.mathSessions||0)+1})}/>;
  if(screen==="packs")return<PackStore student={stData} onUpdate={u=>updateStudent(stData.id,u)} onBack={()=>setScreen("squad")}/>;
  if(screen==="squad")return<SquadBuilder student={stData} onUpdate={u=>updateStudent(stData.id,u)} onBack={()=>{setScreen("home");}}/>;
  if(screen==="flashcard"){
    const card=fcDeck[fcIdx];
    const front=fcDir==="no→en"?card.no:card.en,back=fcDir==="no→en"?card.en:card.no;
    return(
      <div style={s.page}>
        <div style={s.topBar}><button style={s.back} onClick={()=>setScreen("home")}>← Hjem</button><span style={s.topTitle}>Flashcards</span><button style={s.smallBtn} onClick={()=>setFcDir(d=>d==="no→en"?"en→no":"no→en")}>{fcDir==="no→en"?"🇳🇴→🇬🇧":"🇬🇧→🇳🇴"}</button></div>
        <div style={s.progress}>{fcIdx+1}/{fcDeck.length}</div>
        <div style={{...s.card,cursor:"pointer"}} onClick={()=>setFcFlipped(f=>!f)}>
          <div style={s.cardLang}>{fcFlipped?(fcDir==="no→en"?"🇬🇧 Engelsk":"🇳🇴 Norsk"):(fcDir==="no→en"?"🇳🇴 Norsk":"🇬🇧 Engelsk")}</div>
          <div style={s.cardWord}>{fcFlipped?back:front}</div>
          {!fcFlipped&&<div style={s.cardHint}>Trykk for å snu</div>}
        </div>
        <div style={s.row}>
          <button style={s.navBtn} onClick={()=>{setFcIdx(i=>Math.max(0,i-1));setFcFlipped(false);}} disabled={fcIdx===0}>◀ Forrige</button>
          <button style={s.navBtn} onClick={()=>{if(fcIdx<fcDeck.length-1){setFcIdx(i=>i+1);setFcFlipped(false);addCoins(1);}else{addCoins(1);setScreen("home");}}}>{fcIdx<fcDeck.length-1?"Neste +🪙":"Ferdig +🪙"}</button>
        </div>
      </div>
    );
  }
  if(screen==="quiz"){
    if(quizDone)return(
      <div style={s.page}><div style={s.resultBox}>
        <div style={{fontSize:64}}>{quizScore===quizDeck.length?"🏆":quizScore>=quizDeck.length*0.7?"🌟":"💪"}</div>
        <div style={s.resultTitle}>Quiz ferdig!</div>
        <div style={s.resultScore}>{quizScore} av {quizDeck.length}</div>
        <button style={{...s.bigBtn,background:"#e53935"}} onClick={()=>{setQuizDone(false);setShowPenalty(true);}}>⚽ Straffespark!</button>
        <button style={{...s.bigBtn,...s.btnGray}} onClick={()=>{addCoins(quizScore);setScreen("home");}}>Hjem (+{quizScore}🪙)</button>
      </div></div>
    );
    const q=quizDeck[quizIdx];
    const isNew=[...gloser].sort((a,b)=>b.id-a.id).slice(0,NEW_COUNT).some(g=>g.en===q.en);
    return(
      <div style={s.page}>
        <div style={s.topBar}><button style={s.back} onClick={()=>setScreen("home")}>← Hjem</button><span style={s.topTitle}>Quiz</span><span style={{fontSize:14,fontWeight:500}}>⭐{quizScore} 🪙{stData.coins||0}</span></div>
        <div style={s.progress}>{quizIdx+1}/{quizDeck.length}</div>
        <div style={s.questionBox}>
          {isNew&&<div style={{fontSize:11,background:"#fff3e0",color:"#e65100",borderRadius:6,padding:"2px 8px",display:"inline-block",marginBottom:6}}>Ny glose</div>}
          <div style={s.questionLabel}>Hva er engelsk for:</div>
          <div style={s.questionWord}>{q.no}</div>
        </div>
        <div style={s.choicesGrid}>
          {quizChoices.map((c,i)=>{
            let bg="#fff";
            if(quizAnswer!==null){if(c.en===q.en)bg="#d4f7d4";else if(c.en===quizAnswer)bg="#fdd";}
            return<button key={i} style={{...s.choice,background:bg}} onClick={()=>{
              if(quizAnswer!==null)return;
              const cor=quizDeck[quizIdx],ok=c.en===cor.en;
              setQuizAnswer(c.en);recordHistory(cor.en,ok,"quiz");
              if(ok)setQuizScore(sc=>sc+1);
              setTimeout(()=>{
                const nx=quizIdx+1;
                if(nx>=quizDeck.length){
                  const st=getStudent();
                  updateStudent(currentUser.id,{quizSessions:(st.quizSessions||0)+1});
                  setQuizDone(true);
                }
                else{setQuizIdx(nx);setQuizAnswer(null);const nc=quizDeck[nx];setQuizChoices(shuffle([nc,...shuffle(gloser.filter(g=>g.en!==nc.en)).slice(0,3)]));}
              },900);
            }}>{c.en}</button>;
          })}
        </div>
      </div>
    );
  }

  function getStudent() { return students.find(s => s.id === currentUser?.id) || stData; }

  function startFlashcards(){
    const st = getStudent();
    setFcDeck(shuffle(gloser));setFcIdx(0);setFcFlipped(false);
    updateStudent(currentUser.id,{flashcardSessions:(st.flashcardSessions||0)+1});
    setScreen("flashcard");
  }

  function startQuiz(){
    const deck=buildQuizDeck(gloser);setQuizDeck(deck);setQuizIdx(0);setQuizScore(0);setQuizDone(false);setQuizAnswer(null);
    const f=deck[0];setQuizChoices(shuffle([f,...shuffle(gloser.filter(g=>g.en!==f.en)).slice(0,3)]));
    setScreen("quiz");
  }

  return(
    <div style={s.page}>
      {coinAnim&&<div style={{position:"fixed",top:80,right:20,fontSize:20,fontWeight:600,color:"#f9a825",animation:"coinPop 1s",zIndex:99,pointerEvents:"none"}}>{coinAnim}</div>}
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"14px 0 6px"}}>
        <div style={{cursor:"pointer"}} onClick={()=>setScreen("shop")}>
          <AvatarDisplay avatar={stData.avatar} name={stData.name} size={56} coins={stData.coins||0} showCoins/>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:16,fontWeight:500}}>Hei, {stData.name}! 👋</div>
          <div style={{fontSize:12,color:"var(--text3)"}}>{gloser.length} gloser · ⚽{stData.points||0}p</div>
        </div>
        <button style={{background:"none",border:"1px solid #ddd",borderRadius:8,padding:"6px 10px",fontSize:12,color:"#888",cursor:"pointer"}} onClick={()=>setCurrentUser(null)}>Logg ut</button>
      </div>
      <div style={{background:club.bg,borderRadius:12,padding:"10px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:20}}>⚽</span>
        <div style={{flex:1}}><div style={{color:"white",fontWeight:500,fontSize:13}}>{club.name}</div><div style={{color:"rgba(255,255,255,0.7)",fontSize:11}}>{stData.squad?.length||0}/11 spillere</div></div>
        <div style={{color:"white",fontSize:15,fontWeight:500}}>🪙{stData.coins||0}</div>
      </div>
      <div style={s.menuGrid}>
        <button style={{...s.menuBtn,background:"linear-gradient(135deg,#bbdefb,#90caf9)"}} onClick={startFlashcards}><span style={s.menuIcon}>🃏</span><span style={s.menuLabel}>Flashcards</span></button>
        <button style={{...s.menuBtn,background:"linear-gradient(135deg,#e1bee7,#ce93d8)"}} onClick={()=>gloser.length>=4?startQuiz():alert("Trenger minst 4 gloser!")}><span style={s.menuIcon}>🎯</span><span style={s.menuLabel}>Quiz</span></button>
        <button style={{...s.menuBtn,background:"linear-gradient(135deg,#ffcdd2,#ef9a9a)"}} onClick={()=>setScreen("hangman")}><span style={s.menuIcon}>🪢</span><span style={s.menuLabel}>Hangman</span></button>
        <button style={{...s.menuBtn,background:"linear-gradient(135deg,#b2ebf2,#80deea)"}} onClick={()=>setScreen("maths")}><span style={s.menuIcon}>🔢</span><span style={s.menuLabel}>Matte</span></button>
        <button style={{...s.menuBtn,background:"linear-gradient(135deg,#c8e6c9,#a5d6a7)"}} onClick={()=>setScreen("flags")}><span style={s.menuIcon}>🌍</span><span style={s.menuLabel}>Flagg</span></button>
        <button style={{...s.menuBtn,background:"linear-gradient(135deg,#fff9c4,#fff176)"}} onClick={()=>setScreen("shop")}><span style={s.menuIcon}>🛒</span><span style={s.menuLabel}>Butikk</span></button>
        <button style={{...s.menuBtn,background:"linear-gradient(135deg,#dcedc8,#c5e1a5)"}} onClick={()=>setScreen("squad")}><span style={s.menuIcon}>⚽</span><span style={s.menuLabel}>Mitt lag</span></button>
        <button style={{...s.menuBtn,background:"linear-gradient(135deg,#ffe0b2,#ffcc80)"}} onClick={()=>setScreen("leaderboard")}><span style={s.menuIcon}>🏆</span><span style={s.menuLabel}>Poengtavle</span></button>
        <button style={{...s.menuBtn,background:"linear-gradient(135deg,#fff9c4,#fff176)"}} onClick={()=>setScreen("packs")}><span style={s.menuIcon}>🎴</span><span style={s.menuLabel}>Pakker</span></button>
        <button style={{...s.menuBtn,background:"linear-gradient(135deg,#f8bbd0,#f48fb1)",gridColumn:"span 2"}} onClick={()=>setScreen("report")}><span style={s.menuIcon}>📋</span><span style={s.menuLabel}>Rapport</span></button>
      </div>
    </div>
  );
}

const s={
  menuGrid:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginTop:4},
  menuBtn:{border:"none",borderRadius:20,padding:"18px 10px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:8,boxShadow:"0 4px 12px rgba(0,0,0,0.08)",transition:"transform 0.15s",},
  menuIcon:{fontSize:32},menuLabel:{fontSize:13,fontWeight:700},
  card:{background:"#fff",border:"none",borderRadius:24,padding:"36px 24px",textAlign:"center",minHeight:150,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",margin:"0 0 16px",boxShadow:"0 4px 16px rgba(0,0,0,0.08)"},
  cardLang:{fontSize:13,color:"var(--text3)",marginBottom:6},cardWord:{fontSize:34,fontWeight:700},cardHint:{fontSize:12,color:"#bbb",marginTop:12},
  row:{display:"flex",gap:10},navBtn:{flex:1,padding:"13px",borderRadius:16,border:"none",background:"#fff",fontSize:14,cursor:"pointer",fontWeight:600,boxShadow:"0 2px 8px rgba(0,0,0,0.08)"},
  questionBox:{background:"linear-gradient(135deg,#f3e5f5,#e8eaf6)",borderRadius:20,padding:"20px",textAlign:"center",marginBottom:16},
  questionLabel:{fontSize:14,color:"#7c4dff",marginBottom:6,fontWeight:600},questionWord:{fontSize:32,fontWeight:700},
  choicesGrid:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10},
  choice:{padding:"16px 8px",borderRadius:16,border:"none",fontSize:16,cursor:"pointer",fontWeight:600,boxShadow:"0 2px 8px rgba(0,0,0,0.07)",background:"#fff"},
  resultBox:{display:"flex",flexDirection:"column",alignItems:"center",gap:12,paddingTop:28},
  resultTitle:{fontSize:26,fontWeight:800},resultScore:{fontSize:17,color:"var(--text2)"},
  bigBtn:{width:"100%",padding:"15px",borderRadius:16,border:"none",background:"linear-gradient(135deg,#7c4dff,#448aff)",color:"#fff",fontSize:16,cursor:"pointer",fontWeight:700,boxShadow:"0 4px 12px rgba(124,77,255,0.3)"},
  btnGray:{background:"#f0f0f0",color:"#333",boxShadow:"none"},
  addBox:{display:"flex",flexDirection:"column",gap:10,marginBottom:16},
  input:{padding:"12px 14px",borderRadius:14,border:"2px solid #e0e0e0",fontSize:16,background:"#fff"},
  gloseList:{display:"flex",flexDirection:"column",gap:8},
  gloseRow:{display:"flex",alignItems:"center",background:"#fff",borderRadius:14,padding:"10px 12px",boxShadow:"0 2px 6px rgba(0,0,0,0.06)"},
  glosePair:{flex:1,fontSize:15},deleteBtn:{background:"none",border:"none",color:"#ffab91",fontSize:18,cursor:"pointer"},
  letterBox:{width:36,height:44,border:"3px solid #e0e0e0",borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,background:"#fff",fontWeight:700},
  keyboard:{display:"flex",flexWrap:"wrap",gap:5,justifyContent:"center"},
  key:{width:34,height:38,border:"none",borderRadius:10,fontSize:14,fontWeight:700,background:"#fff",boxShadow:"0 2px 6px rgba(0,0,0,0.08)"},
  pinBtn:{padding:"16px",borderRadius:16,border:"none",background:"#fff",fontSize:22,cursor:"pointer",fontWeight:700,boxShadow:"0 2px 8px rgba(0,0,0,0.08)"},
  smallBtn:{background:"#fff",border:"none",borderRadius:10,padding:"4px 10px",fontSize:12,cursor:"pointer",boxShadow:"0 2px 6px rgba(0,0,0,0.08)"},
  smallBtn2:{padding:"7px 14px",borderRadius:10,border:"none",fontSize:13,cursor:"pointer",fontWeight:700},
  progress:{textAlign:"center",fontSize:13,color:"var(--text3)",marginBottom:10},
  back:{background:"none",border:"none",cursor:"pointer",fontSize:14,color:"#7c4dff",padding:0,fontWeight:600},
  topBar:{display:"flex",alignItems:"center",padding:"14px 0 8px",gap:8},
  topTitle:{flex:1,textAlign:"center",fontWeight:800,fontSize:18},
  page:{maxWidth:480,margin:"0 auto",padding:"0 16px 32px"},
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script></body></html>
