<script>
try {
  firebase.initializeApp({ databaseURL: "https://rengaard-e82c6-default-rtdb.europe-west1.firebasedatabase.app" });
  const db = firebase.database();
  window.fbGet = async (key) => { const s = await db.ref(key).get(); return s.exists() ? s.val() : null; };
  window.fbSet = async (key, val) => { await db.ref(key).set(val); };
  window.fbOn  = (key, cb) => { const r = db.ref(key); r.on("value", s => cb(s.exists() ? s.val() : null)); return () => r.off("value"); };
} catch(e) {
  window.fbGet = async () => null;
  window.fbSet = async () => {};
  window.fbOn  = () => () => {};
}
</script>

// ── PIN PAD ──
function PinPad({title,subtitle,error,onSubmit,onBack}){
  const [pin,setPin]=useState("");
  function press(d){
    if(pin.length>=4)return;
    const n=pin+d;setPin(n);
    if(n.length===4)setTimeout(()=>{onSubmit(n);setPin("");},120);
  }
  return(
    <div style={{maxWidth:340,margin:"0 auto",padding:"32px 16px",textAlign:"center"}}>
      {onBack&&<button style={S.back} onClick={onBack}>← Tilbake</button>}
      <div style={{paddingTop:onBack?16:0}}>
        <div style={{fontSize:40,marginBottom:8,animation:"bounce 1.5s infinite"}}>🎓</div>
        <div style={{fontSize:20,fontWeight:800}}>{title}</div>
        {subtitle&&<div style={{fontSize:13,color:"var(--t2)",marginTop:4}}>{subtitle}</div>}
        <div style={{display:"flex",justifyContent:"center",gap:12,margin:"24px 0 8px"}}>
          {[0,1,2,3].map(i=><div key={i} style={{width:18,height:18,borderRadius:"50%",background:pin.length>i?"var(--purple)":"#e0e0e0",transition:"background 0.15s"}}/>)}
        </div>
        {error&&<div style={{fontSize:12,color:"#e53935",margin:"6px 0"}}>{error}</div>}
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginTop:20}}>
          {[1,2,3,4,5,6,7,8,9].map(d=><button key={d} style={S.pb} onClick={()=>press(String(d))}>{d}</button>)}
          <div/><button style={S.pb} onClick={()=>press("0")}>0</button>
          <button style={{...S.pb,color:"var(--t3)"}} onClick={()=>setPin(p=>p.slice(0,-1))}>⌫</button>
        </div>
      </div>
    </div>
  );
}

    onUpdate({coins:coins-cost,purchased:[...purchased,id],avatar:{...avatar,[type]:type==="extra"?true:id}});
    setMsg(`✅ Kjøpt! -${cost} 🪙`);setTimeout(()=>setMsg(""),1500);
  }
  function equip(id,type){
    const free=type==="kit"?kits.find(k=>k.id===id)?.cost===0:type==="hair"?hairs.find(h=>h.id===id)?.cost===0:true;
    if(!free&&!purchased.includes(id))return;
    onUpdate({avatar:{...avatar,[type]:type==="extra"?!avatar.extra:id}});
  }
  const Row=({icon,label,owned,active,cost,onBuy,onEquip})=>(

            :<button style={{padding:"7px 14px",borderRadius:10,border:"none",fontSize:13,cursor:"pointer",fontWeight:700,background:"#f9a825",color:"#fff"}} onClick={onBuy}>Kjøp</button>}
    </div>
  );
  return(
    <div style={S.page}>
      <div style={S.tb}><button style={S.back} onClick={onBack}>← Tilbake</button><span style={S.tt}>🛒 Butikk</span></div>
      <div style={{display:"flex",alignItems:"center",gap:14,background:"#fff",borderRadius:16,padding:"14px",marginBottom:14}}>
        <AvatarDisplay avatar={avatar} size={64} coins={coins} showCoins/>
        <div><div style={{fontWeight:700}}>{student.name}</div><div style={{color:"#f9a825",fontWeight:700}}>🪙 {coins}</div></div>
      </div>
      {msg&&<div style={{background:"#e8f5e9",borderRadius:10,padding:"10px",marginBottom:10,fontSize:14,fontWeight:700,color:"#2e7d32"}}>{msg}</div>}
      <div style={{display:"flex",gap:6,marginBottom:14}}>
        {["gender","kit","hair","extra"].map(t=>(
          <button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:"8px 4px",borderRadius:10,border:"1px solid",borderColor:tab===t?"var(--purple)":"#ddd",background:tab===t?"var(--pl)":"#fafafa",color:tab===t?"var(--pd)":"#555",fontSize:12,cursor:"pointer",fontWeight:tab===t?700:400}}>
            {t==="gender"?"⚧":t==="kit"?(isMale?"👕":"👗"):t==="hair"?"💇":"⭐"}
          </button>
        ))}
      </div>
      {tab==="gender"&&[{g:"male",icon:"⚽",label:"Gutt",bg:"#e3f2fd"},{g:"female",icon:"👗",label:"Jente",bg:"#fce4ec"}].map(({g,icon,label,bg})=>(
        <div key={g} onClick={()=>onUpdate({avatar:{gender:g,kit:"basic",hair:g==="male"?"short":"long",extra:false}})} style={{background:bg,border:`2px solid ${avatar.gender===g?"var(--purple)":"transparent"}`,borderRadius:16,padding:"18px",cursor:"pointer",display:"flex",alignItems:"center",gap:14,marginBottom:10}}>
          <span style={{fontSize:36}}>{icon}</span><div style={{flex:1,fontWeight:700,fontSize:15}}>{label}</div>{avatar.gender===g&&<span>✅</span>}
        </div>

      {tab==="kit"&&kits.map(k=><Row key={k.id} icon={k.body} label={k.label} owned={purchased.includes(k.id)||k.cost===0} active={avatar.kit===k.id} cost={k.cost} onBuy={()=>buy(k.id,k.cost,"kit")} onEquip={()=>equip(k.id,"kit")}/>)}
      {tab==="hair"&&hairs.map(h=><Row key={h.id} icon="💆" label={h.label} owned={purchased.includes(h.id)||h.cost===0} active={avatar.hair===h.id} cost={h.cost} onBuy={()=>buy(h.id,h.cost,"hair")} onEquip={()=>equip(h.id,"hair")}/>)}
      {tab==="extra"&&<Row icon={extraItem.emoji} label={extraItem.label} owned={purchased.includes(extraItem.id)} active={!!avatar.extra} cost={extraItem.cost} onBuy={()=>buy(extraItem.id,extraItem.cost,"extra")} onEquip={()=>equip(extraItem.id,"extra")}/>}
    </div>
  );
}

// ── PACK STORE ──
function PackStore({student,onUpdate,onBack}){
  const [phase,setPhase]=useState("store");
  const [selPack,setSelPack]=useState(null);
  const [revealed,setRevealed]=useState([]);
  const [revIdx,setRevIdx]=useState(0);
  const [msg,setMsg]=useState("");
  const coins=student.coins||0, owned=student.playerCards||[];
  function openPack(pack){
    const pool=PLAYERS.filter(p=>p.rating>=pack.minRating);
    return Array(3).fill(0).map(()=>pool[Math.floor(Math.random()*pool.length)]);
  }
  function buyPack(pack){
    if(coins<pack.price){setMsg("Ikke nok coins!");setTimeout(()=>setMsg(""),2000);return;}
    const players=openPack(pack);
    onUpdate({coins:coins-pack.price});
    setSelPack(pack);setRevealed(players);setRevIdx(0);setPhase("opening");
  }
  function revealNext(){
    const p=revealed[revIdx];
    const ex=student.playerCards||[];
    if(!ex.includes(p.id)){
      const next=[...ex,p.id];
      onUpdate({playerCards:next});
    }
    if(revIdx+1>=revealed.length)setPhase("reveal");
    else setRevIdx(i=>i+1);
  }
  if(phase==="opening"){
    const cur=revealed[revIdx];
    return(<div style={S.page}><div style={{textAlign:"center",padding:"20px 0"}}>
      <div style={{fontSize:13,color:"var(--t3)",marginBottom:4}}>{selPack.label} · Kort {revIdx+1}/3</div>
      <div style={{fontSize:22,fontWeight:800,marginBottom:20}}>🎴 Hvem får du?</div>
      <div style={{display:"flex",justifyContent:"center",marginBottom:20}}><PlayerCard player={cur}/></div>
      <div style={{fontSize:13,color:"var(--t2)",marginBottom:14}}>{owned.includes(cur.id)?"⚠️ Allerede i samlingen":"🆕 Ny spiller!"}</div>
      <button style={S.bigBtn} onClick={revealNext}>{revIdx+1<revealed.length?"Neste kort ▶":"Se alle ✓"}</button>
    </div></div>);
  }
  if(phase==="reveal")return(<div style={S.page}>
    <div style={{textAlign:"center",padding:"16px 0"}}><div style={{fontSize:40}}>🎉</div><div style={{fontSize:20,fontWeight:800,margin:"8px 0"}}>Pakke åpnet!</div></div>
    <div style={{display:"flex",gap:10,justifyContent:"center",marginBottom:20}}>{revealed.map((p,i)=><PlayerCard key={i} player={p}/>)}</div>
    <button style={S.bigBtn} onClick={()=>setPhase("store")}>Kjøp flere</button>
    <button style={{...S.bigBtn,...S.grayBtn,marginTop:10}} onClick={onBack}>Tilbake</button>
  </div>);
  return(<div style={S.page}>
    <div style={S.tb}><button style={S.back} onClick={onBack}>← Tilbake</button><span style={S.tt}>🎴 Pakker</span></div>
    <div style={{background:"linear-gradient(135deg,#1a237e,#283593)",borderRadius:16,padding:"12px 16px",marginBottom:14,display:"flex",alignItems:"center",gap:10}}>
      <span style={{fontSize:24}}>🪙</span>
      <div><div style={{color:"#fff",fontWeight:800,fontSize:16}}>{coins} coins</div><div style={{color:"rgba(255,255,255,0.7)",fontSize:12}}>{owned.length} spillere</div></div>
    </div>
    {msg&&<div style={{background:"#ffcdd2",borderRadius:10,padding:"10px",marginBottom:10,textAlign:"center",fontWeight:700,color:"#c62828"}}>{msg}</div>}
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {PACK_TYPES.map(pack=>(
        <div key={pack.id} style={{background:pack.bg,borderRadius:18,padding:"16px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
            <div><div style={{fontWeight:800,fontSize:18,color:"#fff"}}>{pack.label}</div><div style={{fontSize:12,color:"rgba(255,255,255,0.8)"}}>{pack.desc}</div></div>
            <div style={{fontSize:22,fontWeight:900,color:"#fff"}}>🪙{pack.price}</div>
          </div>
          <button onClick={()=>buyPack(pack)} style={{width:"100%",padding:"12px",borderRadius:12,border:"none",background:"rgba(255,255,255,0.25)",color:"#fff",fontSize:15,fontWeight:800,cursor:"pointer"}}>
            {coins>=pack.price?"🎴 Åpne pakke!":"🔒 Ikke nok coins"}
          </button>
        </div>
      ))}
    </div>
    {owned.length>0&&<><div style={{fontSize:13,fontWeight:700,color:"var(--t2)",margin:"16px 0 8px"}}>Din samling ({owned.length})</div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>{PLAYERS.filter(p=>owned.includes(p.id)).map(p=><PlayerCard key={p.id} player={p} size="small"/>)}</div></>}
  </div>);
}

// ── FLAG QUIZ ──
function FlagQuiz({onBack,addCoins,onDone}){
  const [deck]=useState(()=>getDailyFlags());
  const [idx,setIdx]=useState(0);
  const [chosen,setChosen]=useState(null);
  const [score,setScore]=useState(0);
  const [done,setDone]=useState(false);
  const [choices,setChoices]=useState([]);
  function makeChoices(i){
    setChoices(shuffle([deck[i],...shuffle(FLAGS.filter(f=>f.code!==deck[i].code)).slice(0,3)]));
    setChosen(null);
  }
  useEffect(()=>{makeChoices(0);},[]);
  function pick(flag){
    if(chosen)return;
    setChosen(flag.code);
    const ok=flag.code===deck[idx].code;
    if(ok){setScore(sc=>sc+1);if(addCoins)addCoins(1);}
    setTimeout(()=>{
      if(idx+1>=deck.length){if(onDone)onDone();setDone(true);}
      else{setIdx(i=>{makeChoices(i+1);return i+1;});}
    },1000);
  }
  if(done)return(<div style={S.page}><div style={S.rb}>
    <div style={{fontSize:64}}>{score>=18?"🏆":score>=12?"🌟":"💪"}</div>
    <div style={{fontSize:24,fontWeight:800}}>Flaggquiz ferdig!</div>
    <div style={{fontSize:17,color:"var(--t2)"}}>{score} av {deck.length} riktige</div>
    <div style={{fontSize:16,color:"#f9a825",fontWeight:700}}>+{score} 🪙</div>
    <button style={{...S.bigBtn,...S.grayBtn}} onClick={onBack}>Hjem</button>
  </div></div>);
  const cur=deck[idx];
  return(<div style={S.page}>
    <div style={S.tb}><button style={S.back} onClick={onBack}>← Hjem</button><span style={S.tt}>🌍 Flaggquiz</span><span style={{fontSize:14,fontWeight:700}}>⭐{score}</span></div>
    <div style={S.prog}>{idx+1}/{deck.length}</div>
    <div style={{textAlign:"center",marginBottom:20}}>
      <div style={{fontSize:13,color:"var(--t3)",marginBottom:12}}>Hvilket land er dette?</div>
      <img src={`https://flagcdn.com/w160/${cur.code.toLowerCase()}.png`} alt={cur.code} style={{width:160,height:100,objectFit:"cover",borderRadius:10,border:"1px solid #ddd",boxShadow:"0 4px 12px rgba(0,0,0,0.15)"}}/>
    </div>
    <div style={S.cg}>{choices.map((f,i)=>{
      let bg="#fff",border="1px solid #ddd";
      if(chosen){if(f.code===cur.code){bg="#d4f7d4";border="2px solid #43a047";}else if(f.code===chosen){bg="#fdd";border="2px solid #e53935";}}
      return<button key={i} style={{...S.choice,background:bg,border,fontSize:14,padding:"16px 8px"}} onClick={()=>pick(f)}>{f.name}</button>;
    })}</div>
  </div>);
}

// ── HANGMAN ──
function HangmanGame({gloser,onBack,onCorrect,onDone,onRecord}){
  const [deck]=useState(()=>shuffle(gloser).slice(0,10));
  const [idx,setIdx]=useState(0);
  const [guessed,setGuessed]=useState(new Set());
  const [score,setScore]=useState(0);
  const [done,setDone]=useState(false);
  const word=deck[idx]?.en||"", hint=deck[idx]?.no||"";
  const letters=word.split("");
  const wrong=[...guessed].filter(l=>!letters.includes(l));
  const wc=wrong.length, won=letters.length>0&&letters.every(l=>guessed.has(l)), lost=wc>=MAX_WRONG, fin=won||lost;
  function guess(l){
    if(fin||guessed.has(l))return;
    const nx=new Set(guessed);nx.add(l);setGuessed(nx);
    const nowWrong=[...nx].filter(g=>!letters.includes(g)).length;
    const nowWon=letters.every(c=>nx.has(c));
    if(nowWon){setScore(sc=>sc+1);if(onCorrect)onCorrect();if(onRecord)onRecord(deck[idx].en,true);}
    else if(nowWrong>=MAX_WRONG){if(onRecord)onRecord(deck[idx].en,false);}
  }
  function next(){
    if(idx+1>=deck.length){if(onDone)onDone();setDone(true);return;}
    setIdx(i=>i+1);setGuessed(new Set());
  }
  const alpha="abcdefghijklmnopqrstuvwxyz".split("");
  if(done)return(<div style={S.page}><div style={S.rb}>
    <div style={{fontSize:64}}>{score===deck.length?"🏆":score>=deck.length*0.6?"🌟":"💪"}</div>
    <div style={{fontSize:24,fontWeight:800}}>Ferdig!</div>
    <div style={{fontSize:17,color:"var(--t2)"}}>{score} av {deck.length}</div>
    <div style={{fontSize:16,color:"#f9a825",fontWeight:700}}>+{score} 🪙</div>
    <button style={S.bigBtn} onClick={()=>{setIdx(0);setGuessed(new Set());setScore(0);setDone(false);}}>Prøv igjen</button>
    <button style={{...S.bigBtn,...S.grayBtn}} onClick={onBack}>Hjem</button>
  </div></div>);
  return(<div style={S.page}>
    <div style={S.tb}><button style={S.back} onClick={onBack}>← Hjem</button><span style={S.tt}>🪢 Hangman</span><span style={{fontSize:14,fontWeight:700}}>⭐{score}</span></div>
    <div style={S.prog}>{idx+1}/{deck.length}</div>
    <div style={{display:"flex",justifyContent:"center",marginBottom:4}}>
      <svg viewBox="0 0 120 130" width="120" height="130">
        <line x1="10" y1="125" x2="110" y2="125" stroke="#555" strokeWidth="3" strokeLinecap="round"/>
        <line x1="30" y1="125" x2="30" y2="10" stroke="#555" strokeWidth="3" strokeLinecap="round"/>
        <line x1="30" y1="10" x2="75" y2="10" stroke="#555" strokeWidth="3" strokeLinecap="round"/>
        <line x1="75" y1="10" x2="75" y2="25" stroke="#555" strokeWidth="3" strokeLinecap="round"/>
        {wc>=1&&<circle cx="75" cy="33" r="8" stroke="#e53935" strokeWidth="2.5" fill="none"/>}
        {wc>=2&&<><line x1="75" y1="41" x2="75" y2="70" stroke="#e53935" strokeWidth="2.5" strokeLinecap="round"/><line x1="75" y1="50" x2="58" y2="62" stroke="#e53935" strokeWidth="2.5" strokeLinecap="round"/><line x1="75" y1="50" x2="92" y2="62" stroke="#e53935" strokeWidth="2.5" strokeLinecap="round"/></>}
        {wc>=3&&<><line x1="75" y1="70" x2="62" y2="88" stroke="#e53935" strokeWidth="2.5" strokeLinecap="round"/><line x1="75" y1="70" x2="88" y2="88" stroke="#e53935" strokeWidth="2.5" strokeLinecap="round"/></>}
      </svg>
    </div>
    <div style={{textAlign:"center",fontSize:13,color:"var(--t2)",marginBottom:6}}>Norsk: <strong>{hint}</strong></div>
    <div style={{display:"flex",justifyContent:"center",gap:6,flexWrap:"wrap",margin:"8px 0 12px"}}>
      {letters.map((l,i)=><div key={i} style={S.lb}>{guessed.has(l)?<span style={{fontSize:20,fontWeight:700}}>{l}</span>:<span style={{color:"#ddd"}}>_</span>}</div>)}
    </div>
    {wrong.length>0&&<div style={{textAlign:"center",fontSize:12,color:"#e57373",marginBottom:6}}>Feil: {wrong.join(" ")} ({MAX_WRONG-wc} igjen)</div>}
    {fin?(<div style={{textAlign:"center",marginBottom:14}}>
      {won?<div style={{fontSize:20,color:"#43a047",fontWeight:700}}>🎉 Bra!</div>:<div style={{fontSize:15,color:"#e53935"}}>Ordet var: <strong>{word}</strong></div>}
      <button style={{...S.bigBtn,marginTop:12}} onClick={next}>{idx+1<deck.length?"Neste ▶":"Se resultat"}</button>
    </div>):(<div style={S.kb}>
      {alpha.map(l=><button key={l} style={{...S.key,background:guessed.has(l)?(letters.includes(l)?"#c8e6c9":"#ffcdd2"):"#f5f5f5",color:guessed.has(l)?"#999":"#222"}} onClick={()=>guess(l)}>{l}</button>)}
    </div>)}
  </div>);
}

// ── MATHS ──
function MathGame({mode,onBack,addCoins,onDone}){
  const [score,setScore]=useState(0);
  const [q,setQ]=useState(null);
  const [chosen,setChosen]=useState(null);
  const [done,setDone]=useState(false);
  const [round,setRound]=useState(0);
  const TOTAL=10;
  function newQ(){
    let a,b,answer,op;
    if(mode==="multiply"){a=Math.floor(Math.random()*10)+1;b=Math.floor(Math.random()*10)+1;answer=a*b;op="×";}
    else if(mode==="add"){a=Math.floor(Math.random()*20)+1;b=Math.floor(Math.random()*20)+1;answer=a+b;op="+";}
    else{a=Math.floor(Math.random()*20)+10;b=Math.floor(Math.random()*a)+1;answer=a-b;op="−";}
    const wrong=new Set();
    while(wrong.size<3){const w=answer+(Math.floor(Math.random()*8)-4);if(w!==answer&&w>0)wrong.add(w);}
    setQ({a,b,answer,op,choices:shuffle([answer,...wrong])});setChosen(null);
  }
  useEffect(()=>{newQ();},[]);
  function pick(val){
    if(chosen!==null)return;setChosen(val);
    if(val===q.answer){setScore(sc=>sc+1);if(addCoins)addCoins(1);}
    setTimeout(()=>{
      if(round+1>=TOTAL){if(onDone)onDone();setDone(true);}
      else{setRound(r=>r+1);newQ();}
    },900);
  }
  const colors={multiply:"#e0f7fa",add:"#e8f5e9",subtract:"#fff3e0"};
  const titles={multiply:"✖️ Ganging",add:"➕ Addisjon",subtract:"➖ Subtraksjon"};
  if(done)return(<div style={S.page}><div style={S.rb}>
    <div style={{fontSize:64}}>{score>=9?"🏆":score>=6?"🌟":"💪"}</div>
    <div style={{fontSize:24,fontWeight:800}}>Ferdig!</div>
    <div style={{fontSize:17,color:"var(--t2)"}}>{score} av {TOTAL}</div>
    <div style={{fontSize:16,color:"#f9a825",fontWeight:700}}>+{score} 🪙</div>
    <button style={S.bigBtn} onClick={()=>{setScore(0);setRound(0);setDone(false);newQ();}}>Prøv igjen</button>
    <button style={{...S.bigBtn,...S.grayBtn}} onClick={onBack}>Hjem</button>
  </div></div>);
  if(!q)return null;

function HomeworkPanel({students,onSaveStudents,onBack}){
  const [sel,setSel]=useState(students[0]?.id||null);
  const [msg,setMsg]=useState("");
  const [label,setLabel]=useState(()=>{
    const d=new Date();
    const days=["Søndag","Mandag","Tirsdag","Onsdag","Torsdag","Fredag","Lørdag"];
    return `${days[d.getDay()]} ${d.getDate()}.${d.getMonth()+1}.${d.getFullYear()}`;
  });
  const [confirmReset,setConfirmReset]=useState(null);
  const st=students.find(s=>s.id===sel);

  function getStats(st){
    const h=st?.history||[];
    const qi=h.filter(x=>x.source==="quiz");
    const hi=h.filter(x=>x.source==="hangman");
    const total=qi.length+hi.length;
    const correct=qi.filter(x=>x.correct).length+hi.filter(x=>x.correct).length;
    return{total,correct,pct:total>0?Math.round(correct/total*100):null};
  }

  function approveAndReset(student){
    const stats=getStats(student);
    const session={label,date:new Date().toISOString(),quizSessions:student.quizSessions||0,hangmanSessions:student.hangmanSessions||0,flashcardSessions:student.flashcardSessions||0,correct:stats.correct,total:stats.total,pct:stats.pct,approved:true};
    const updated={...student,history:[],quizSessions:0,hangmanSessions:0,flashcardSessions:0,mathAddSessions:0,mathSubtractSessions:0,mathMultiplySessions:0,flagSessions:0,bonusGivenDate:"",homeworkSessions:[...(student.homeworkSessions||[]),session]};
    onSaveStudents(students.map(s=>s.id===student.id?updated:s));
    setMsg(`✅ ${student.name} godkjent og nullstilt!`);setConfirmReset(null);
    setTimeout(()=>setMsg(""),3000);
  }

  function deleteSession(student,i){
    const sessions=[...(student.homeworkSessions||[])];sessions.splice(i,1);
    onSaveStudents(students.map(s=>s.id===student.id?{...s,homeworkSessions:sessions}:s));

  const stats=getStats(st);

          <AvatarDisplay avatar={x.avatar} size={22}/>{x.name}
        </button>
      ))}
    </div>
    {st&&<>
      <div style={{background:"#fff",borderRadius:16,padding:"14px",marginBottom:12,boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}>
        <div style={{fontWeight:800,fontSize:15,marginBottom:10}}>📊 Dagens aktivitet — {st.name}</div>

function TeacherReport({gloser,students,singleStudent,onBack}){
  const [sel,setSel]=useState(singleStudent||students[0]?.id||null);
  const st=students.find(s=>s.id===sel);
  const history=st?.history||[];
  const sorted=[...gloser].sort((a,b)=>b.id-a.id);
  const newest=sorted.slice(0,NEW_COUNT), older=sorted.slice(NEW_COUNT);
  const qi=history.filter(h=>h.source==="quiz"), hi=history.filter(h=>h.source==="hangman");
  const qp=qi.length>0?Math.round(qi.filter(h=>h.correct).length/qi.length*100):0;
  const hp=hi.length>0?Math.round(hi.filter(h=>h.correct).length/hi.length*100):0;
  function status(en){const items=history.filter(h=>h.en===en&&h.source==="quiz");if(!items.length)return"ikke øvd";const p=items.filter(h=>h.correct).length/items.length;return p>=0.75?"kan":p>=0.4?"nesten":"trenger øving";}
  const sc2=x=>x==="kan"?"#2e7d32":x==="nesten"?"#e65100":x==="trenger øving"?"#c62828":"#aaa";
  const se=x=>x==="kan"?"✅":x==="nesten"?"🔶":x==="trenger øving"?"❌":"⬜";
  function SC({icon,title,sessions,correct,total,pct}){return(
    <div style={{background:"#fff",borderRadius:12,padding:"12px",marginBottom:8,boxShadow:"0 2px 6px rgba(0,0,0,0.05)"}}>

        {total!=null&&<><div style={{background:"#f9f9f9",borderRadius:8,padding:"8px",textAlign:"center"}}><div style={{fontSize:18,fontWeight:700}}>{total>0?`${correct}/${total}`:"–"}</div><div style={{fontSize:11,color:"var(--t3)"}}>Riktige</div></div><div style={{background:"#f9f9f9",borderRadius:8,padding:"8px",textAlign:"center"}}><div style={{fontSize:18,fontWeight:700,color:pct>=70?"#2e7d32":pct>=40?"#e65100":"var(--t3)"}}>{total>0?pct+"%":"–"}</div><div style={{fontSize:11,color:"var(--t3)"}}>Prosent</div></div></>}
      </div>
    </div>
  );}
  function WR({g}){const x=status(g.en);const it=history.filter(h=>h.en===g.en&&h.source==="quiz");return(
    <div style={{display:"flex",alignItems:"center",padding:"9px 12px",borderBottom:"1px solid #f0f0f0",gap:8}}>
      <span style={{flex:1,fontSize:14}}>{g.no} <span style={{color:"#bbb"}}>→</span> {g.en}</span>
      {it.length>0&&<span style={{fontSize:11,color:"var(--t3)"}}>{it.filter(h=>h.correct).length}/{it.length}</span>}
      <span style={{fontSize:12,fontWeight:700,color:sc2(x),minWidth:90,textAlign:"right"}}>{se(x)} {x}</span>
    </div>
  );}
  return(<div style={S.page}>
    <div style={S.tb}><button style={S.back} onClick={onBack}>← Tilbake</button><span style={S.tt}>📋 Rapport</span></div>
    <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
      {students.map(x=>(<button key={x.id} onClick={()=>setSel(x.id)} style={{padding:"5px 12px",borderRadius:20,border:"1px solid",borderColor:sel===x.id?"var(--purple)":"#ddd",background:sel===x.id?"var(--pl)":"#fafafa",color:sel===x.id?"var(--pd)":"#555",fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}><AvatarDisplay avatar={x.avatar} size={20}/>{x.name}</button>))}
    </div>

    <SC icon="🪢" title="Hangman" sessions={st?.hangmanSessions||0} correct={hi.filter(h=>h.correct).length} total={hi.length} pct={hp}/>
    <SC icon="➕" title="Addisjon" sessions={st?.mathAddSessions||0}/>
    <SC icon="➖" title="Subtraksjon" sessions={st?.mathSubtractSessions||0}/>
    <SC icon="✖️" title="Gangetabell" sessions={st?.mathMultiplySessions||0}/>
    <SC icon="🌍" title="Flaggquiz" sessions={st?.flagSessions||0}/>
    {gloser.length>0&&<>
      <div style={{fontSize:13,fontWeight:700,color:"var(--t3)",margin:"8px 0 6px"}}>NYE GLOSER</div>
      <div style={{background:"#fff",borderRadius:12,marginBottom:10,overflow:"hidden",boxShadow:"0 2px 6px rgba(0,0,0,0.05)"}}>{newest.map(g=><WR key={g.id} g={g}/>)}</div>
      {older.length>0&&<><div style={{fontSize:13,fontWeight:700,color:"var(--t3)",margin:"0 0 6px"}}>TIDLIGERE GLOSER</div><div style={{background:"#fff",borderRadius:12,marginBottom:10,overflow:"hidden",boxShadow:"0 2px 6px rgba(0,0,0,0.05)"}}>{older.map(g=><WR key={g.id} g={g}/>)}</div></>}

// ── PENALTY ──
function PenaltyGame({onDone}){
  const [phase,setPhase]=useState("aim");
  const [target,setTarget]=useState({x:50,y:50});
  const [scored,setScored]=useState(null);
  const [shots,setShots]=useState([]);
  const [current,setCurrent]=useState(0);
  const TOTAL=5;
  function shoot(){
    if(phase!=="aim")return;
    const keeperX=Math.random()>0.5?20:80;
    const hit=Math.abs(target.x-keeperX)>25||target.y<30;
    setPhase("flying");
    setTimeout(()=>{
      const ns=[...shots,hit];setShots(ns);setScored(hit);setPhase("result");
      setTimeout(()=>{
        if(current+1>=TOTAL){onDone(ns.filter(Boolean).length);}
        else{setCurrent(c=>c+1);setScored(null);setPhase("aim");setTarget({x:50,y:50});}
      },1200);
    },800);
  }
  return(<div style={{textAlign:"center",padding:"16px 0"}}>
    <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>Skytt {current+1}/{TOTAL} · Mål: {shots.filter(Boolean).length}</div>
    <div style={{position:"relative",width:"100%",maxWidth:320,margin:"0 auto",height:180,background:"linear-gradient(180deg,#90ee90,#228b22)",borderRadius:12,overflow:"hidden",cursor:phase==="aim"?"crosshair":"default",border:"2px solid #555"}}
      onClick={e=>{if(phase!=="aim")return;const r=e.currentTarget.getBoundingClientRect();setTarget({x:((e.clientX-r.left)/r.width)*100,y:((e.clientY-r.top)/r.height)*100});}}>
      <div style={{position:"absolute",top:10,left:"15%",width:"70%",height:"55%",border:"4px solid white",borderBottom:"none",pointerEvents:"none"}}/>
      {phase==="aim"&&<div style={{position:"absolute",left:`${target.x}%`,top:`${target.y}%`,transform:"translate(-50%,-50%)",fontSize:22,pointerEvents:"none"}}>⚽</div>}
      {phase==="result"&&scored!==null&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",background:scored?"rgba(0,180,0,0.5)":"rgba(200,0,0,0.5)",fontSize:32}}>{scored?"⚽ MÅL!":"❌ Reddet!"}</div>}
    </div>
    {phase==="aim"&&<button style={{...S.bigBtn,marginTop:14,background:"#e53935"}} onClick={shoot}>🦵 Skyt!</button>}
    <div style={{display:"flex",justifyContent:"center",gap:8,marginTop:10}}>
      {Array(TOTAL).fill(0).map((_,i)=><span key={i} style={{fontSize:18}}>{i<shots.length?(shots[i]?"⚽":"❌"):"⬜"}</span>)}
    </div>
  </div>);
}

// ── MAIN APP ──
function App(){
  const [students,setStudents]=useState([]);
  const [gloser,setGloser]=useState([]);
  const [loaded,setLoaded]=useState(false);
  const [currentUser,setCurrentUser]=useState(null);
  const [selecting,setSelecting]=useState(null);
  const [loginError,setLoginError]=useState("");
  const [screen,setScreen]=useState("home");
  const [coinAnim,setCoinAnim]=useState(null);
  const [bonusAnim,setBonusAnim]=useState(false);
  // quiz state
  const [quizDeck,setQuizDeck]=useState([]);
  const [quizIdx,setQuizIdx]=useState(0);
  const [quizChoices,setQuizChoices]=useState([]);
  const [quizAnswer,setQuizAnswer]=useState(null);
  const [quizScore,setQuizScore]=useState(0);
  const [quizDone,setQuizDone]=useState(false);
  const [showPenalty,setShowPenalty]=useState(false);
  const [penaltyResult,setPenaltyResult]=useState(null);
  // flashcard state
  const [fcDeck,setFcDeck]=useState([]);
  const [fcIdx,setFcIdx]=useState(0);
  const [fcFlipped,setFcFlipped]=useState(false);
  const [fcDir,setFcDir]=useState("no→en");

  const studentsRef=useRef([]);
  const bonusGivenRef=useRef({});
  useEffect(()=>{studentsRef.current=students;},[students]);

  const [dbStatus,setDbStatus]=useState("laster...");

  // Load from Firebase — kun én gang, ingen live-lytter som overskriver
  useEffect(()=>{
    async function load(){
      function fixStudent(s){
        if(!s)return s;
        // Konverter lineup fra objekt tilbake til array
        let lineup=Array(11).fill(null);
        if(s.lineup){
          if(Array.isArray(s.lineup)){
            lineup=s.lineup.map(v=>(!v||v==="empty")?null:v);
          } else {
            // objekt fra Firebase
            for(let i=0;i<11;i++){
              const v=s.lineup[i];
              lineup[i]=(!v||v==="empty")?null:v;
            }
          }
        }
        return {...s, lineup};
      }
      try {
        const ss=await dbGet("students");
        if(ss){
          const arr=(Array.isArray(ss)?ss.filter(Boolean):Object.values(ss).filter(v=>v&&v.id)).map(fixStudent);
          setStudents(arr);
          studentsRef.current=arr;
          setDbStatus("✅ Firebase OK – "+arr.length+" elever");
        } else {
          setStudents(defaultStudents);
          studentsRef.current=defaultStudents;
          await dbSet("students",Object.fromEntries(defaultStudents.map(s=>[s.id,s])));
          setDbStatus("⚠️ Tom database – lagret defaults");
        }
        const gg=await dbGet("gloser");
        if(gg){setGloser(Array.isArray(gg)?gg.filter(Boolean):Object.values(gg).filter(Boolean));}
        else{setGloser(defaultGloser);await dbSet("gloser",Object.fromEntries(defaultGloser.map(g=>[g.id,g])));}
      } catch(e) {
        setDbStatus("❌ Firebase feil: "+e.message);
        setStudents(defaultStudents);
        studentsRef.current=defaultStudents;
        setGloser(defaultGloser);
      }
      setLoaded(true);
    }
    load();
  },[]);

  // Bonus check
  useEffect(()=>{
    if(!currentUser||currentUser==="admin")return;
    const st=studentsRef.current.find(s=>s.id===currentUser.id);
    if(!st)return;
    const key=todayStr()+"_"+currentUser.id;
    if(bonusGivenRef.current[key])return;
    if(st.bonusGivenDate===todayStr())return;
    if(!isHomeworkComplete(st))return;
    bonusGivenRef.current[key]=true;
    setBonusAnim(true);
    setTimeout(()=>setBonusAnim(false),4000);
    updateStudent(currentUser.id,{coins:(st.coins||0)+HOMEWORK_BONUS,points:(st.points||0)+HOMEWORK_BONUS,bonusGivenDate:todayStr()});
  },[students]);

  async function saveStudents(ns){
    const clean=ns.filter(Boolean);
    studentsRef.current=clean;
    setStudents(clean);
    const obj={};clean.forEach(s=>{if(s?.id)obj[s.id]=s;});
    await dbSet("students",obj);
  }
  async function saveGloser(ng){
    const clean=ng.filter(Boolean);
    setGloser(clean);
    const obj={};clean.forEach(g=>{if(g?.id)obj[g.id]=g;});
    await dbSet("gloser",obj);
  }
  async function updateStudent(id,updates){
    const cur=studentsRef.current.find(s=>s.id===id)||{};
    const merged={...cur,...updates};
    const next=studentsRef.current.map(s=>s.id!==id?s:merged);
    studentsRef.current=next;
    setStudents(next);
    if(currentUser&&currentUser!=="admin"&&currentUser.id===id)setCurrentUser(u=>({...u,...updates}));
    try{await window.fbSet("glose/students/"+id,merged);}catch(e){console.error("Firebase write failed",e);}
  }
  function getStudent(){return studentsRef.current.find(s=>s.id===currentUser?.id)||{};}
  function addCoins(c){
    if(!c||!currentUser||currentUser==="admin")return;
    setCoinAnim(`+${c} 🪙`);setTimeout(()=>setCoinAnim(null),1500);
    const st=getStudent();
    updateStudent(currentUser.id,{coins:(st.coins||0)+c,points:(st.points||0)+c});
  }
  function recordHistory(en,correct,source){
    const st=studentsRef.current.find(s=>s.id===currentUser?.id);if(!st)return;
    updateStudent(currentUser.id,{history:[...(st.history||[]),{en,correct,source}]});
  }
  function incSession(key){
    const st=getStudent();
    updateStudent(currentUser.id,{[key]:(st[key]||0)+1});
  }

  // ── LOADING ──
  if(!loaded)return(<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",gap:12}}>
    <div style={{fontSize:48,animation:"bounce 1.5s infinite"}}>🎓</div>
    <div style={{fontSize:16,color:"var(--t2)"}}>Laster...</div>
  </div>);

  // ── LOGIN ──
  if(!currentUser){
    if(!selecting)return(<div style={{maxWidth:380,margin:"0 auto",padding:"32px 16px",textAlign:"center"}}>
      <div style={{fontSize:56,animation:"bounce 1.5s infinite"}}>🎓</div>
      <div style={{fontSize:24,fontWeight:800,marginTop:8,background:"linear-gradient(135deg,#7c4dff,#448aff)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Glose-appen</div>
      <div style={{fontSize:11,color:"#888",marginTop:8,padding:"6px 12px",background:"#f5f5f5",borderRadius:8}}>{dbStatus}</div>
      <div style={{fontSize:14,color:"var(--t2)",marginTop:4,marginBottom:24}}>Hvem er du? 👇</div>
      <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:20}}>
        {students.map((st,i)=>{
          const colors=["linear-gradient(135deg,#bbdefb,#90caf9)","linear-gradient(135deg,#e1bee7,#ce93d8)","linear-gradient(135deg,#c8e6c9,#a5d6a7)","linear-gradient(135deg,#ffcdd2,#ef9a9a)","linear-gradient(135deg,#fff9c4,#fff176)","linear-gradient(135deg,#ffe0b2,#ffcc80)"];
          return(<button key={st.id} onClick={()=>{setSelecting(st);setLoginError("");}} style={{padding:"12px 18px",borderRadius:20,border:"none",background:colors[i%colors.length],fontSize:16,cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:12,boxShadow:"0 4px 12px rgba(0,0,0,0.08)",fontWeight:600}}>
            <AvatarDisplay avatar={st.avatar} size={46} coins={st.coins||0} showCoins/>
            <div><div style={{fontWeight:800}}>{st.name}</div><div style={{fontSize:11,color:"#555"}}>{(st.club||CLUBS[0]).name} · 🪙{st.coins||0}</div></div>
          </button>);
        })}
      </div>
      <button onClick={()=>{setSelecting("admin");setLoginError("");}} style={{width:"100%",padding:"12px",borderRadius:14,border:"none",background:"#ede7f6",color:"#7c4dff",fontSize:14,cursor:"pointer",fontWeight:700}}>🔒 Admin / Lærer</button>
    </div>);
    if(selecting==="admin")return<PinPad title="Admin" subtitle="Admin PIN" error={loginError} onBack={()=>{setSelecting(null);setLoginError("");}} onSubmit={p=>{if(p===ADMIN_PIN){setCurrentUser("admin");setSelecting(null);}else setLoginError("Feil PIN.")}}/>;
    return<PinPad title={selecting.name} subtitle="PIN-kode" error={loginError} onBack={()=>{setSelecting(null);setLoginError("");}} onSubmit={p=>{if(p===selecting.pin){setCurrentUser(selecting);setSelecting(null);setScreen("home");}else setLoginError("Feil PIN.")}}/>;
  }

  // ── ADMIN ──
  if(currentUser==="admin")return<AdminPanel students={students} gloser={gloser} onSaveStudents={saveStudents} onSaveGloser={saveGloser} onBack={()=>setCurrentUser(null)}/>;

  // ── STUDENT SCREENS ──
  const stData=students.find(s=>s.id===currentUser.id)||{...currentUser};
  const club=stData.club||CLUBS[0];

  if(showPenalty)return(<div style={S.page}>
    <div style={{textAlign:"center",padding:"18px 0 8px"}}><div style={{fontSize:24,fontWeight:800}}>⚽ Straffespark!</div></div>
    <PenaltyGame onDone={goals=>{const bonus=goals*2;addCoins(quizScore+bonus);setPenaltyResult({goals,bonus});setShowPenalty(false);}}/>
  </div>);

  if(penaltyResult)return(<div style={S.page}><div style={S.rb}>
    <AvatarDisplay avatar={stData.avatar} size={80} coins={stData.coins} showCoins/>
    <div style={{fontSize:24,fontWeight:800}}>Økt ferdig!</div>
    <div style={{fontSize:22,fontWeight:800,color:"#f9a825"}}>+{quizScore+penaltyResult.bonus} 🪙</div>
    <button style={S.bigBtn} onClick={()=>{setPenaltyResult(null);setScreen("shop");}}>🛒 Til butikken!</button>
    <button style={{...S.bigBtn,...S.grayBtn}} onClick={()=>{setPenaltyResult(null);setScreen("home");}}>Hjem</button>
  </div></div>);

  if(screen==="shop")return<AvatarShop student={stData} onUpdate={u=>updateStudent(stData.id,u)} onBack={()=>setScreen("home")}/>;
  if(screen==="packs")return<PackStore student={stData} onUpdate={u=>updateStudent(stData.id,u)} onBack={()=>setScreen("home")}/>;
  if(screen==="leaderboard")return<Leaderboard students={students} onBack={()=>setScreen("home")}/>;
  if(screen==="report")return<TeacherReport gloser={gloser} students={students} singleStudent={stData.id} onBack={()=>setScreen("home")}/>;
  if(screen==="hangman")return<HangmanGame gloser={gloser} onBack={()=>setScreen("home")} onCorrect={()=>addCoins(1)} onRecord={(en,c)=>recordHistory(en,c,"hangman")} onDone={()=>incSession("hangmanSessions")}/>;
  if(screen==="geo")return<GeoMenu onBack={()=>setScreen("home")} addCoins={addCoins} onFlagDone={()=>incSession("flagSessions")}/>;
  if(screen==="maths")return<MathMenu onBack={()=>setScreen("home")} addCoins={addCoins} onDone={m=>incSession(m==="multiply"?"mathMultiplySessions":m==="add"?"mathAddSessions":"mathSubtractSessions")}/>;

  if(screen==="flashcard"){
    const card=fcDeck[fcIdx]||{no:"",en:""};
    const front=fcDir==="no→en"?card.no:card.en, back=fcDir==="no→en"?card.en:card.no;
    return(<div style={S.page}>
      <div style={S.tb}><button style={S.back} onClick={()=>setScreen("home")}>← Hjem</button><span style={S.tt}>🃏 Flashcards</span>
        <button style={{background:"#fff",border:"none",borderRadius:10,padding:"4px 10px",fontSize:12,cursor:"pointer"}} onClick={()=>setFcDir(d=>d==="no→en"?"en→no":"no→en")}>{fcDir==="no→en"?"🇳🇴→🇬🇧":"🇬🇧→🇳🇴"}</button>
      </div>
      <div style={S.prog}>{fcIdx+1}/{fcDeck.length}</div>
      <div style={{...S.card,cursor:"pointer",minHeight:160}} onClick={()=>setFcFlipped(f=>!f)}>
        <div style={{fontSize:13,color:"var(--t3)",marginBottom:6}}>{fcFlipped?(fcDir==="no→en"?"🇬🇧 Engelsk":"🇳🇴 Norsk"):(fcDir==="no→en"?"🇳🇴 Norsk":"🇬🇧 Engelsk")}</div>
        <div style={{fontSize:34,fontWeight:800}}>{fcFlipped?back:front}</div>
        {!fcFlipped&&<div style={{fontSize:12,color:"#bbb",marginTop:12}}>Trykk for å snu</div>}
      </div>
      <div style={{display:"flex",gap:10}}>
        <button style={{flex:1,padding:"13px",borderRadius:16,border:"none",background:"#fff",fontSize:14,cursor:"pointer",fontWeight:700}} onClick={()=>{setFcIdx(i=>Math.max(0,i-1));setFcFlipped(false);}} disabled={fcIdx===0}>◀ Forrige</button>
        <button style={{flex:1,padding:"13px",borderRadius:16,border:"none",background:"#fff",fontSize:14,cursor:"pointer",fontWeight:700}} onClick={()=>{if(fcIdx<fcDeck.length-1){setFcIdx(i=>i+1);setFcFlipped(false);addCoins(1);}else{addCoins(1);setScreen("home");}}}>{fcIdx<fcDeck.length-1?"Neste +🪙":"Ferdig +🪙"}</button>
      </div>
    </div>);
  }

  if(screen==="quiz"){
    if(quizDone)return(<div style={S.page}><div style={S.rb}>
      <div style={{fontSize:64}}>{quizScore===quizDeck.length?"🏆":quizScore>=quizDeck.length*0.7?"🌟":"💪"}</div>
      <div style={{fontSize:24,fontWeight:800}}>Quiz ferdig!</div>
      <div style={{fontSize:17,color:"var(--t2)"}}>{quizScore} av {quizDeck.length}</div>
      <button style={{...S.bigBtn,background:"#e53935"}} onClick={()=>{setQuizDone(false);setShowPenalty(true);}}>⚽ Straffespark!</button>
      <button style={{...S.bigBtn,...S.grayBtn}} onClick={()=>{addCoins(quizScore);setScreen("home");}}>Hjem (+{quizScore}🪙)</button>
    </div></div>);
    const q=quizDeck[quizIdx];
    const isNew=[...gloser].sort((a,b)=>b.id-a.id).slice(0,NEW_COUNT).some(g=>g.en===q.en);
    return(<div style={S.page}>
      <div style={S.tb}><button style={S.back} onClick={()=>setScreen("home")}>← Hjem</button><span style={S.tt}>🎯 Quiz</span><span style={{fontSize:14,fontWeight:700}}>⭐{quizScore}</span></div>
      <div style={S.prog}>{quizIdx+1}/{quizDeck.length}</div>
      <div style={{background:"linear-gradient(135deg,#f3e5f5,#e8eaf6)",borderRadius:20,padding:"20px",textAlign:"center",marginBottom:16}}>
        {isNew&&<div style={{fontSize:11,background:"#fff3e0",color:"#e65100",borderRadius:6,padding:"2px 8px",display:"inline-block",marginBottom:6}}>Ny glose</div>}
        <div style={{fontSize:14,color:"var(--purple)",marginBottom:6,fontWeight:700}}>Hva er engelsk for:</div>
        <div style={{fontSize:32,fontWeight:800}}>{q.no}</div>
      </div>
      <div style={S.cg}>{quizChoices.map((c,i)=>{
        let bg="#fff";
        if(quizAnswer!==null){if(c.en===q.en)bg="#d4f7d4";else if(c.en===quizAnswer)bg="#fdd";}
        return<button key={i} style={{...S.choice,background:bg}} onClick={()=>{
          if(quizAnswer!==null)return;
          const ok=c.en===q.en;
          setQuizAnswer(c.en);recordHistory(q.en,ok,"quiz");
          if(ok)setQuizScore(sc=>sc+1);
          setTimeout(()=>{
            const nx=quizIdx+1;
            if(nx>=quizDeck.length){incSession("quizSessions");setQuizDone(true);}
            else{setQuizIdx(nx);setQuizAnswer(null);const nc=quizDeck[nx];setQuizChoices(shuffle([nc,...shuffle(gloser.filter(g=>g.en!==nc.en)).slice(0,3)]));}
          },900);
        }}>{c.en}</button>;
      })}</div>
    </div>);
  }

  // ── HOME ──
  function startFlashcards(){
    setFcDeck(shuffle(gloser));setFcIdx(0);setFcFlipped(false);
    incSession("flashcardSessions");setScreen("flashcard");
  }
  function startQuiz(){
    if(gloser.length<4){alert("Trenger minst 4 gloser!");return;}
    const deck=buildQuizDeck(gloser);setQuizDeck(deck);setQuizIdx(0);setQuizScore(0);setQuizDone(false);setQuizAnswer(null);
    setQuizChoices(shuffle([deck[0],...shuffle(gloser.filter(g=>g.en!==deck[0].en)).slice(0,3)]));
    setScreen("quiz");
  }

  const doneTasks=HOMEWORK_TASKS.filter(t=>(stData[t.key]||0)>=1).length;
  const allDone=doneTasks===HOMEWORK_TASKS.length;
  const alreadyBonused=stData.bonusGivenDate===todayStr();

  return(<div style={S.page}>
    {/* Animations */}
    {coinAnim&&<div style={{position:"fixed",top:80,right:20,fontSize:20,fontWeight:800,color:"#f9a825",animation:"coinPop 1s",zIndex:99,pointerEvents:"none"}}>{coinAnim}</div>}
    {bonusAnim&&<div style={{position:"fixed",inset:0,display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,pointerEvents:"none",background:"rgba(0,0,0,0.3)"}}>
      <div style={{background:"linear-gradient(135deg,#f9a825,#ff6f00)",borderRadius:24,padding:"28px 36px",textAlign:"center",animation:"fadeIn 0.4s"}}>
        <div style={{fontSize:56}}>🎉</div>
        <div style={{fontSize:22,fontWeight:900,color:"#fff",marginTop:8}}>Alle lekser gjort!</div>
        <div style={{fontSize:32,fontWeight:900,color:"#fff",marginTop:4}}>+{HOMEWORK_BONUS} 🪙 BONUS!</div>
      </div>
    </div>}

    {/* Header */}
    <div style={{display:"flex",alignItems:"center",gap:10,padding:"14px 0 6px"}}>
      <div style={{cursor:"pointer"}} onClick={()=>setScreen("shop")}><AvatarDisplay avatar={stData.avatar} size={56} coins={stData.coins||0} showCoins/></div>
      <div style={{flex:1}}><div style={{fontSize:16,fontWeight:800}}>Hei, {stData.name}! 👋</div><div style={{fontSize:12,color:"var(--t3)"}}>{gloser.length} gloser · {stData.points||0}p</div></div>
      <button style={{background:"none",border:"1px solid #ddd",borderRadius:8,padding:"6px 10px",fontSize:12,color:"#888",cursor:"pointer"}} onClick={()=>setCurrentUser(null)}>Logg ut</button>
    </div>

    {/* Homework progress */}
    <div style={{background:allDone?"linear-gradient(135deg,#e8f5e9,#c8e6c9)":"linear-gradient(135deg,#fff8e1,#fff3e0)",borderRadius:14,padding:"12px 14px",marginBottom:12}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
        <div style={{fontWeight:800,fontSize:13,color:allDone?"#2e7d32":"#e65100"}}>
          {allDone?"✅ Alle lekser gjort!":`📚 Lekser: ${doneTasks}/${HOMEWORK_TASKS.length}`}
        </div>
        {alreadyBonused&&<div style={{fontSize:12,color:"#f9a825",fontWeight:700}}>🪙+{HOMEWORK_BONUS} mottatt!</div>}
        {!alreadyBonused&&!allDone&&<div style={{fontSize:11,color:"#888"}}>+{HOMEWORK_BONUS}🪙 bonus</div>}
      </div>
      <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
        {HOMEWORK_TASKS.map(t=>{
          const isDone=(stData[t.key]||0)>=1;
          return(<div key={t.key} style={{display:"flex",alignItems:"center",gap:3,background:isDone?"#43a047":"#e0e0e0",borderRadius:20,padding:"3px 8px"}}>
            <span style={{fontSize:12}}>{t.icon}</span>
            <span style={{fontSize:10,fontWeight:700,color:isDone?"#fff":"#888"}}>{isDone?"✓":t.label}</span>
          </div>);
        })}
      </div>
    </div>

    {/* Club bar */}
    <div style={{background:club.bg,borderRadius:12,padding:"10px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:10,cursor:"pointer"}} onClick={()=>setScreen("packs")}>
      <span style={{fontSize:20}}>⚽</span>
      <div style={{flex:1}}><div style={{color:"white",fontWeight:800,fontSize:13}}>{club.name}</div></div>
      <div style={{color:"white",fontSize:15,fontWeight:800}}>🪙{stData.coins||0}</div>
    </div>

    {/* Menu grid */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      {[
        {icon:"🃏",label:"Flashcards",bg:"linear-gradient(135deg,#bbdefb,#90caf9)",action:startFlashcards},
        {icon:"🎯",label:"Quiz",bg:"linear-gradient(135deg,#e1bee7,#ce93d8)",action:startQuiz},
        {icon:"🪢",label:"Hangman",bg:"linear-gradient(135deg,#ffcdd2,#ef9a9a)",action:()=>setScreen("hangman")},
        {icon:"🔢",label:"Matte",bg:"linear-gradient(135deg,#b2ebf2,#80deea)",action:()=>setScreen("maths")},
        {icon:"🌍",label:"Geografi",bg:"linear-gradient(135deg,#c8e6c9,#a5d6a7)",action:()=>setScreen("geo")},
        {icon:"🛒",label:"Butikk",bg:"linear-gradient(135deg,#fff9c4,#fff176)",action:()=>setScreen("shop")},
        {icon:"🎴",label:"Pakker",bg:"linear-gradient(135deg,#dcedc8,#c5e1a5)",action:()=>setScreen("packs")},
        {icon:"🏆",label:"Poengtavle",bg:"linear-gradient(135deg,#ffe0b2,#ffcc80)",action:()=>setScreen("leaderboard")},
      ].map(({icon,label,bg,action})=>(
        <button key={label} onClick={action} style={{border:"none",borderRadius:20,padding:"18px 10px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:8,background:bg,boxShadow:"0 4px 12px rgba(0,0,0,0.08)"}}>
          <span style={{fontSize:30}}>{icon}</span><span style={{fontSize:13,fontWeight:800}}>{label}</span>
        </button>
      ))}
      <button onClick={()=>setScreen("report")} style={{border:"none",borderRadius:20,padding:"18px 10px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:8,background:"linear-gradient(135deg,#f8bbd0,#f48fb1)",boxShadow:"0 4px 12px rgba(0,0,0,0.08)",gridColumn:"span 2"}}>
        <span style={{fontSize:30}}>📋</span><span style={{fontSize:13,fontWeight:800}}>Rapport</span>
      </button>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script></body></html>
