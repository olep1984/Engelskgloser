<script>
  firebase.initializeApp({
    databaseURL: "https://rengaard-e82c6-default-rtdb.europe-west1.firebasedatabase.app"
  });
  const db = firebase.database();
  window.fbGet = async (key) => {
    const snap = await db.ref(key).get();
    return snap.exists() ? snap.val() : null;
  };
  window.fbSet = async (key, val) => {
    await db.ref(key).set(val);
  };
  window.fbOn = (key, cb) => {
    db.ref(key).on("value", snap => cb(snap.exists() ? snap.val() : null));
    return () => db.ref(key).off();
  };
</script>

function AvatarShop({student,onUpdate,onBack}){
  const [tab,setTab]=useState("kit");

  const coins=student.coins||0;

    if(!purchased.includes(itemId)&&itemId!=="basic"&&itemId!=="short"&&itemId!=="none")return;

    <div style={s.page}>

// ── MATHS GAME ──
function MathGame({onBack, addCoins, mode}) {
  const [score, setScore] = useState(0);
  const [q, setQ] = useState(null);
  const [chosen, setChosen] = useState(null);
  const [done, setDone] = useState(false);
  const [round, setRound] = useState(0);
  const TOTAL = 10;

  function newQuestion() {
    let a, b, answer, op;
    if (mode === "multiply") {
      a = Math.floor(Math.random() * 10) + 1;
      b = Math.floor(Math.random() * 10) + 1;
      answer = a * b; op = "×";
    } else if (mode === "add") {
      a = Math.floor(Math.random() * 20) + 1;
      b = Math.floor(Math.random() * 20) + 1;
      answer = a + b; op = "+";
    } else {
      a = Math.floor(Math.random() * 20) + 10;
      b = Math.floor(Math.random() * a) + 1;
      answer = a - b; op = "−";
    }
    const wrong = new Set();
    while (wrong.size < 3) {
      let w = answer + (Math.floor(Math.random() * 8) - 4);
      if (w !== answer && w > 0) wrong.add(w);
    }
    setQ({a, b, answer, op, choices: shuffle([answer, ...wrong])});
    setChosen(null);
  }

  useEffect(() => { newQuestion(); }, []);

  function pick(val) {
    if (chosen !== null) return;
    setChosen(val);
    if (val === q.answer) { setScore(s => s + 1); addCoins(1); }
    setTimeout(() => {
      if (round + 1 >= TOTAL) setDone(true);
      else { setRound(r => r + 1); newQuestion(); }
    }, 900);
  }

  const colors = {multiply:"#e0f7fa", add:"#e8f5e9", subtract:"#fff3e0"};
  const titles = {multiply:"✖️ Ganging", add:"➕ Addisjon", subtract:"➖ Subtraksjon"};

  if (done) return (
    <div style={s.page}><div style={s.resultBox}>
      <div style={{fontSize:64}}>{score>=9?"🏆":score>=6?"🌟":"💪"}</div>
      <div style={s.resultTitle}>Ferdig!</div>
      <div style={s.resultScore}>{score} av {TOTAL} riktige</div>
      <div style={{fontSize:16,color:"#f9a825",fontWeight:500}}>+{score} 🪙 coins tjent!</div>
      <button style={s.bigBtn} onClick={()=>{setScore(0);setRound(0);setDone(false);newQuestion();}}>Prøv igjen</button>
      <button style={{...s.bigBtn,...s.btnGray}} onClick={onBack}>Hjem</button>
    </div></div>
  );

  if (!q) return null;
  return (
    <div style={s.page}>
      <div style={s.topBar}><button style={s.back} onClick={onBack}>← Hjem</button><span style={s.topTitle}>{titles[mode]}</span><span style={{fontSize:14,fontWeight:500}}>⭐ {score}</span></div>
      <div style={s.progress}>{round+1} / {TOTAL}</div>
      <div style={{background:colors[mode],borderRadius:20,padding:"40px 24px",textAlign:"center",marginBottom:20}}>
        <div style={{fontSize:13,color:"var(--text3)",marginBottom:8}}>Hva er?</div>
        <div style={{fontSize:52,fontWeight:500}}>{q.a} {q.op} {q.b} = ?</div>
      </div>
      <div style={s.choicesGrid}>
        {q.choices.map((c,i)=>{
          let bg="#fff";
          if(chosen!==null){if(c===q.answer)bg="#d4f7d4";else if(c===chosen)bg="#fdd";}
          return <button key={i} style={{...s.choice,background:bg,fontSize:26,fontWeight:500,padding:"22px 8px"}} onClick={()=>pick(c)}>{c}</button>;
        })}
      </div>
    </div>
  );
}

// ── PENALTY ──
function PenaltyGame({onDone}){
  const [phase,setPhase]=useState("aim");
  const [target,setTarget]=useState({x:50,y:50});
  const [scored,setScored]=useState(null);
  const [shots,setShots]=useState([]);
  const [current,setCurrent]=useState(0);
  const TOTAL=5;
  function shoot(){
    if(phase!=="aim")return;
    const keeperX=Math.random()>0.5?20:80;
    const hit=Math.abs(target.x-keeperX)>25||target.y<30;
    setPhase("flying");
    setTimeout(()=>{
      const ns=[...shots,hit];setShots(ns);setScored(hit);setPhase("result");
      setTimeout(()=>{if(current+1>=TOTAL){onDone(ns.filter(Boolean).length);}else{setCurrent(c=>c+1);setScored(null);setPhase("aim");setTarget({x:50,y:50});}},1200);
    },800);
  }
  return(
    <div style={{textAlign:"center",padding:"16px 0"}}>
      <div style={{fontSize:13,fontWeight:500,marginBottom:12}}>Skytt {current+1} av {TOTAL} · Mål: {shots.filter(Boolean).length}</div>
      <div style={{position:"relative",width:"100%",maxWidth:320,margin:"0 auto",height:180,background:"linear-gradient(180deg,#90ee90,#228b22)",borderRadius:12,overflow:"hidden",cursor:phase==="aim"?"crosshair":"default",border:"2px solid #555"}}
        onClick={e=>{if(phase!=="aim")return;const r=e.currentTarget.getBoundingClientRect();setTarget({x:((e.clientX-r.left)/r.width)*100,y:((e.clientY-r.top)/r.height)*100});}}>
        <div style={{position:"absolute",top:10,left:"15%",width:"70%",height:"55%",border:"4px solid white",borderBottom:"none",pointerEvents:"none"}}/>
        {phase==="aim"&&<div style={{position:"absolute",left:`${target.x}%`,top:`${target.y}%`,transform:"translate(-50%,-50%)",fontSize:22,pointerEvents:"none"}}>⚽</div>}
        {phase==="result"&&scored!==null&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",background:scored?"rgba(0,180,0,0.5)":"rgba(200,0,0,0.5)",fontSize:36}}>{scored?"⚽ MÅL!":"❌ Reddet!"}</div>}
        {phase==="aim"&&<div style={{position:"absolute",bottom:8,width:"100%",textAlign:"center",fontSize:11,color:"rgba(255,255,255,0.8)"}}>Trykk der du vil skyte</div>}
      </div>
      {phase==="aim"&&<button style={{...s.bigBtn,marginTop:16,background:"#e53935"}} onClick={shoot}>🦵 Skyt!</button>}
      <div style={{display:"flex",justifyContent:"center",gap:8,marginTop:12}}>
        {Array(TOTAL).fill(0).map((_,i)=><span key={i} style={{fontSize:20}}>{i<shots.length?(shots[i]?"⚽":"❌"):"⬜"}</span>)}
      </div>
    </div>
  );
}

// ── HANGMAN ──
function HangmanGame({gloser,onBack,onCorrect}){
  const [deck]=useState(()=>shuffle(gloser));
  const [idx,setIdx]=useState(0);
  const [guessed,setGuessed]=useState(new Set());
  const [score,setScore]=useState(0);
  const [done,setDone]=useState(false);
  const word=deck[idx]?.en||"",hint=deck[idx]?.no||"";
  const letters=word.split("");
  const wrong=[...guessed].filter(l=>!letters.includes(l));
  const wrongCount=wrong.length,won=letters.every(l=>guessed.has(l)),lost=wrongCount>=MAX_WRONG,finished=won||lost;
  function guess(l){
    if(finished||guessed.has(l))return;
    const nx=new Set(guessed);nx.add(l);setGuessed(nx);
    if(letters.every(c=>nx.has(c))){setScore(sc=>sc+1);onCorrect&&onCorrect();}
  }
  function next(){if(idx+1>=deck.length){setDone(true);return;}setIdx(i=>i+1);setGuessed(new Set());}
  const alpha="abcdefghijklmnopqrstuvwxyz".split("");
  if(done)return(
    <div style={s.page}><div style={s.resultBox}>
      <div style={{fontSize:64}}>{score===deck.length?"🏆":score>=deck.length*0.6?"🌟":"💪"}</div>
      <div style={s.resultTitle}>Ferdig!</div><div style={s.resultScore}>{score} av {deck.length} ord!</div>
      <div style={{fontSize:16,color:"#f9a825",fontWeight:500}}>+{score} 🪙 coins tjent!</div>
      <button style={s.bigBtn} onClick={()=>{setIdx(0);setGuessed(new Set());setScore(0);setDone(false);}}>Prøv igjen</button>
      <button style={{...s.bigBtn,...s.btnGray}} onClick={onBack}>Hjem</button>
    </div></div>
  );
  return(
    <div style={s.page}>
      <div style={s.topBar}><button style={s.back} onClick={onBack}>← Hjem</button><span style={s.topTitle}>Hangman</span><span style={{fontSize:14,fontWeight:500}}>⭐ {score}</span></div>
      <div style={s.progress}>{idx+1}/{deck.length}</div>
      <div style={{display:"flex",justifyContent:"center",marginBottom:4}}>
        <svg viewBox="0 0 120 130" width="120" height="130">
          <line x1="10" y1="125" x2="110" y2="125" stroke="#555" strokeWidth="3" strokeLinecap="round"/>
          <line x1="30" y1="125" x2="30" y2="10" stroke="#555" strokeWidth="3" strokeLinecap="round"/>
          <line x1="30" y1="10" x2="75" y2="10" stroke="#555" strokeWidth="3" strokeLinecap="round"/>
          <line x1="75" y1="10" x2="75" y2="25" stroke="#555" strokeWidth="3" strokeLinecap="round"/>
          {wrongCount>=1&&<circle cx="75" cy="33" r="8" stroke="#e53935" strokeWidth="2.5" fill="none"/>}
          {wrongCount>=2&&<><line x1="75" y1="41" x2="75" y2="70" stroke="#e53935" strokeWidth="2.5" strokeLinecap="round"/><line x1="75" y1="50" x2="58" y2="62" stroke="#e53935" strokeWidth="2.5" strokeLinecap="round"/><line x1="75" y1="50" x2="92" y2="62" stroke="#e53935" strokeWidth="2.5" strokeLinecap="round"/></>}
          {wrongCount>=3&&<><line x1="75" y1="70" x2="62" y2="88" stroke="#e53935" strokeWidth="2.5" strokeLinecap="round"/><line x1="75" y1="70" x2="88" y2="88" stroke="#e53935" strokeWidth="2.5" strokeLinecap="round"/></>}
        </svg>
      </div>
      <div style={{textAlign:"center",fontSize:13,color:"var(--text2)",marginBottom:6}}>Norsk: <strong>{hint}</strong></div>
      <div style={{display:"flex",justifyContent:"center",gap:8,flexWrap:"wrap",margin:"10px 0 16px"}}>
        {letters.map((l,i)=><div key={i} style={s.letterBox}>{guessed.has(l)?<span style={{fontSize:22,fontWeight:500}}>{l}</span>:<span style={{color:"#ddd"}}>_</span>}</div>)}
      </div>
      {wrong.length>0&&<div style={{textAlign:"center",fontSize:12,color:"#e57373",marginBottom:8}}>Feil: {wrong.join("  ")} ({MAX_WRONG-wrongCount} igjen)</div>}
      {finished?(
        <div style={{textAlign:"center",marginBottom:16}}>
          {won?<div style={{fontSize:22,color:"#43a047",fontWeight:500}}>🎉 Bra jobbet!</div>:<div style={{fontSize:16,color:"#e53935"}}>Ordet var: <strong>{word}</strong></div>}
          <button style={{...s.bigBtn,marginTop:14}} onClick={next}>{idx+1<deck.length?"Neste ▶":"Se resultat"}</button>
        </div>
      ):(
        <div style={s.keyboard}>
          {alpha.map(l=><button key={l} style={{...s.key,background:guessed.has(l)?(letters.includes(l)?"#c8e6c9":"#ffcdd2"):"#f5f5f5",color:guessed.has(l)?"#999":"#222",cursor:guessed.has(l)?"default":"pointer"}} onClick={()=>guess(l)}>{l}</button>)}
        </div>
      )}
    </div>
  );
}

// ── TEACHER REPORT ──
function TeacherReport({gloser, students, singleStudent, onBack}) {
  const [sel, setSel] = useState(singleStudent || students[0]?.id || null);
  const [copied, setCopied] = useState(false);
  const st = students.find(s => s.id === sel);
  const sorted = [...gloser].sort((a,b) => b.id - a.id);
  const newest = sorted.slice(0, NEW_COUNT), older = sorted.slice(NEW_COUNT);
  const today = new Date().toLocaleDateString("no-NO", {day:"numeric",month:"long",year:"numeric"});

  function status(en) {
    if (!st) return "ikke øvd";
    const items = st.history.filter(h => h.en === en && h.source === "quiz");
    if (!items.length) return "ikke øvd";
    const p = items.filter(h => h.correct).length / items.length;
    return p >= 0.75 ? "kan" : p >= 0.4 ? "nesten" : "trenger øving";
  }
  function sc(x){return x==="kan"?"#2e7d32":x==="nesten"?"#e65100":x==="trenger øving"?"#c62828":"#aaa";}
  function se(x){return x==="kan"?"✅":x==="nesten"?"🔶":x==="trenger øving"?"❌":"⬜";}

  const history = st?.history || [];
  const qi = history.filter(h => h.source === "quiz");
  const hi = history.filter(h => h.source === "hangman");
  const qp = qi.length > 0 ? Math.round(qi.filter(h=>h.correct).length/qi.length*100) : 0;
  const hp = hi.length > 0 ? Math.round(hi.filter(h=>h.correct).length/hi.length*100) : 0;
  const can = gloser.filter(g => status(g.en) === "kan").length;
  const kit = (st?.avatar?.gender==="female" ? FEMALE_KITS : MALE_KITS).find(k=>k.id===(st?.avatar?.kit||"basic")) || MALE_KITS[0];
  function buildText() {
    let t = `Rapport – ${st?.name} – ${today}\n\n`;
    t += `AKTIVITET\n`;
    t += `  🃏 Flashcards: ${st?.flashcardSessions||0} økter\n`;
    t += `  🎯 Quiz: ${st?.quizSessions||0} økter – ${qi.filter(h=>h.correct).length}/${qi.length} riktige (${qp}%)\n`;
    t += `  🪢 Hangman: ${st?.hangmanSessions||0} økter – ${hi.filter(h=>h.correct).length}/${hi.length} ord (${hp}%)\n`;
    t += `  ✖️ Matte: ${st?.mathSessions||0} økter\n`;
    t += `  🪙 Coins: ${st?.coins||0} · Avatar: ${kit.label}\n\n`;
    t += `GLOSER (${can}/${gloser.length} behersket)\nNYE:\n`;
    newest.forEach(g => { t += `  ${se(status(g.en))} ${g.no} → ${g.en} (${status(g.en)})\n`; });
    if (older.length) { t += `\nTIDLIGERE:\n`; older.forEach(g => { t += `  ${se(status(g.en))} ${g.no} → ${g.en} (${status(g.en)})\n`; }); }
    return t;
  }

  function WR({g}) {
    const x = status(g.en);
    const it = st?.history.filter(h => h.en === g.en && h.source === "quiz") || [];
    return (
      <div style={{display:"flex",alignItems:"center",padding:"9px 12px",borderBottom:"1px solid #f0f0f0",gap:8}}>
        <span style={{flex:1,fontSize:14}}>{g.no} <span style={{color:"#bbb"}}>→</span> {g.en}</span>
        {it.length > 0 && <span style={{fontSize:11,color:"#aaa"}}>{it.filter(h=>h.correct).length}/{it.length}</span>}
        <span style={{fontSize:12,fontWeight:500,color:sc(x),minWidth:90,textAlign:"right"}}>{se(x)} {x}</span>
      </div>
    );
  }

  function StatCard({icon, title, sessions, correct, total, pct, extra}) {
    return (
      <div style={{background:"#fff",border:"1px solid #eee",borderRadius:12,padding:"12px 14px",marginBottom:10}}>
        <div style={{fontSize:14,fontWeight:500,marginBottom:8}}>{icon} {title}</div>
        <div style={{display:"grid",gridTemplateColumns:total!=null?"1fr 1fr 1fr":"1fr",gap:8}}>
          <div style={{background:"#f9f9f9",borderRadius:8,padding:"8px",textAlign:"center"}}>
            <div style={{fontSize:20,fontWeight:500}}>{sessions}</div>
            <div style={{fontSize:11,color:"#aaa",marginTop:2}}>Økter</div>
          </div>
          {total != null && <>
            <div style={{background:"#f9f9f9",borderRadius:8,padding:"8px",textAlign:"center"}}>
              <div style={{fontSize:20,fontWeight:500}}>{total>0?`${correct}/${total}`:"–"}</div>
              <div style={{fontSize:11,color:"#aaa",marginTop:2}}>Riktige</div>
            </div>
            <div style={{background:"#f9f9f9",borderRadius:8,padding:"8px",textAlign:"center"}}>
              <div style={{fontSize:20,fontWeight:500,color:pct>=70?"#2e7d32":pct>=40?"#e65100":"#aaa"}}>{total>0?pct+"%":"–"}</div>
              <div style={{fontSize:11,color:"#aaa",marginTop:2}}>Prosent</div>
            </div>
          </>}
        </div>
        {extra && <div style={{fontSize:12,color:"var(--text3)",marginTop:8}}>{extra}</div>}
      </div>
    );
  }

  return (
    <div style={s.page}>
      <div style={s.topBar}><button style={s.back} onClick={onBack}>← Tilbake</button><span style={s.topTitle}>📋 Rapport</span></div>

      {/* Student selector — always show all */}
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
        {students.map(x => (
          <button key={x.id} onClick={()=>setSel(x.id)} style={{padding:"6px 14px",borderRadius:20,border:"1px solid",borderColor:sel===x.id?"var(--purple)":"#ddd",background:sel===x.id?"var(--purple-light)":"#fafafa",color:sel===x.id?"var(--purple-dark)":"#555",fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
            <AvatarDisplay avatar={x.avatar} name={x.name} size={22}/>
            {x.name}
          </button>
        ))}
      </div>

      <div style={{background:"#f9f9f9",borderRadius:12,padding:"12px",marginBottom:12,fontSize:13,color:"var(--text2)",display:"flex",alignItems:"center",gap:10}}>
        <AvatarDisplay avatar={st?.avatar} name={st?.name} size={40}/>
        <div>
          <div style={{fontWeight:500}}>{st?.name}</div>
          <div>{today} · {can}/{gloser.length} gloser · 🪙 {st?.coins||0} coins</div>
        </div>
      </div>

      <div style={{fontSize:13,fontWeight:500,color:"var(--text3)",margin:"0 0 8px"}}>AKTIVITET</div>
      <StatCard icon="🃏" title="Flashcards" sessions={st?.flashcardSessions||0}/>
      <StatCard icon="🎯" title="Quiz" sessions={st?.quizSessions||0} correct={qi.filter(h=>h.correct).length} total={qi.length} pct={qp}/>
      <StatCard icon="🪢" title="Hangman" sessions={st?.hangmanSessions||0} correct={hi.filter(h=>h.correct).length} total={hi.length} pct={hp}/>
      <StatCard icon="✖️" title="Matte" sessions={st?.mathSessions||0}/>

      <div style={{background:"#fff",border:"1px solid #eee",borderRadius:12,padding:"12px 14px",marginBottom:12}}>
        <div style={{fontSize:14,fontWeight:500,marginBottom:8}}>🛒 Avatar</div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <AvatarDisplay avatar={st?.avatar} name={st?.name} size={56}/>
          <div style={{fontSize:13,color:"var(--text2)"}}>
            <div>{st?.avatar?.gender==="female"?"👧 Jente":"👦 Gutt"}</div>
            <div>Drakt: {kit.label}</div>
            <div>🪙 {st?.coins||0} coins totalt</div>
          </div>
        </div>
      </div>

      <div style={{fontSize:13,fontWeight:500,color:"var(--text3)",margin:"16px 0 6px"}}>NYE GLOSER</div>
      <div style={{background:"#fff",border:"1px solid #eee",borderRadius:12,marginBottom:12,overflow:"hidden"}}>{newest.map(g=><WR key={g.id} g={g}/>)}</div>
      {older.length>0&&<><div style={{fontSize:13,fontWeight:500,color:"var(--text3)",margin:"0 0 6px"}}>TIDLIGERE GLOSER</div><div style={{background:"#fff",border:"1px solid #eee",borderRadius:12,marginBottom:12,overflow:"hidden"}}>{older.map(g=><WR key={g.id} g={g}/>)}</div></>}
      <div style={{display:"flex",gap:8,fontSize:12,color:"var(--text3)",marginBottom:16,flexWrap:"wrap"}}><span>✅ kan</span><span>🔶 nesten</span><span>❌ trenger øving</span><span>⬜ ikke øvd</span></div>
      <button style={s.bigBtn} onClick={()=>{navigator.clipboard.writeText(buildText());setCopied(true);setTimeout(()=>setCopied(false),2000);}}>{copied?"✅ Kopiert!":"📋 Kopier til utklippstavle"}</button>
    </div>
  );
}

  const [newNo,setNewNo]=useState("");

          {[...gloser].sort((a,b)=>b.id-a.id).map((g,i)=>(
            <div key={g.id} style={s.gloseRow}>
              {i<NEW_COUNT&&<span style={{fontSize:10,background:"#fff3e0",color:"#e65100",borderRadius:4,padding:"1px 5px",marginRight:6}}>NY</span>}
              <span style={s.glosePair}>{g.no} <span style={{color:"#aaa"}}>→</span> {g.en}</span>
              <button style={s.deleteBtn} onClick={()=>onSaveGloser(gloser.filter(x=>x.id!==g.id))}>✕</button>
            </div>
          ))}
        </div>
      </>}

      {tab==="report"&&<TeacherReport gloser={gloser} students={students} onBack={()=>setTab("students")}/>}    </div>
  );
}

// ── PIN PAD ──
function PinPad({title,subtitle,onSubmit,error,onBack}){
  const [pin,setPin]=useState("");
  function press(d){if(pin.length>=4)return;const n=pin+d;setPin(n);if(n.length===4){setTimeout(()=>{onSubmit(n);setPin("");},120);}}
  return(
    <div style={{maxWidth:340,margin:"0 auto",padding:"32px 16px",textAlign:"center"}}>
      {onBack&&<button style={s.back} onClick={onBack}>← Tilbake</button>}
      <div style={{paddingTop:onBack?16:0}}>
        <div style={{fontSize:40,marginBottom:8}}>🎓</div>
        <div style={{fontSize:20,fontWeight:500}}>{title}</div>
        {subtitle&&<div style={{fontSize:13,color:"var(--text2)",marginTop:4}}>{subtitle}</div>}
        <div style={{display:"flex",justifyContent:"center",gap:12,margin:"24px 0 8px"}}>
          {[0,1,2,3].map(i=><div key={i} style={{width:18,height:18,borderRadius:"50%",background:pin.length>i?"var(--purple)":"#e0e0e0",transition:"background 0.15s"}}/>)}
        </div>
        {error&&<div style={{fontSize:12,color:"#e53935",margin:"6px 0"}}>{error}</div>}
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginTop:20}}>
          {[1,2,3,4,5,6,7,8,9].map(d=><button key={d} style={s.pinBtn} onClick={()=>press(String(d))}>{d}</button>)}
          <div/><button style={s.pinBtn} onClick={()=>press("0")}>0</button>
          <button style={{...s.pinBtn,color:"var(--text3)"}} onClick={()=>setPin(p=>p.slice(0,-1))}>⌫</button>
        </div>
      </div>
    </div>
  );
}

// ── MAIN APP ──
function App(){
  const [students,setStudentsState]=useState(defaultStudents);
  const [gloser,setGloserState]=useState(defaultGloser);
  const [loaded,setLoaded]=useState(false);
  const [currentUser,setCurrentUser]=useState(null);
  const [loginError,setLoginError]=useState("");
  const [selecting,setSelecting]=useState(null);
  const [screen,setScreen]=useState("home");
  const [quizDeck,setQuizDeck]=useState([]);
  const [quizIdx,setQuizIdx]=useState(0);
  const [quizChoices,setQuizChoices]=useState([]);
  const [quizAnswer,setQuizAnswer]=useState(null);
  const [quizScore,setQuizScore]=useState(0);
  const [quizDone,setQuizDone]=useState(false);
  const [fcDeck,setFcDeck]=useState([]);
  const [fcIdx,setFcIdx]=useState(0);
  const [fcFlipped,setFcFlipped]=useState(false);
  const [fcDir,setFcDir]=useState("no→en");
  const [showPenalty,setShowPenalty]=useState(false);
  const [penaltyResult,setPenaltyResult]=useState(null);
  const [coinAnim,setCoinAnim]=useState(null);

  // Load shared data on mount
  useEffect(()=>{
    async function load(){
      const ss=await dbGet("students");
      const gg=await dbGet("gloser");
      if(ss)setStudentsState(ss);
      if(gg)setGloserState(gg);
      setLoaded(true);
    }
    load();
  },[]);

  async function saveStudents(ns){setStudentsState(ns);await dbSet("students",ns);}
  async function saveGloser(ng){setGloserState(ng);await dbSet("gloser",ng);}

  async function updateStudent(id,updates){
    const ns=students.map(st=>st.id!==id?st:{...st,...updates});
    await saveStudents(ns);
    if(currentUser&&currentUser.id===id)setCurrentUser(u=>({...u,...updates}));
  }

  function addCoins(c){
    setCoinAnim(`+${c} 🪙`);setTimeout(()=>setCoinAnim(null),1500);
    const st=students.find(s=>s.id===currentUser.id);
    if(!st)return;
    const np=(st.points||0)+c,nc=(st.coins||0)+c;
    const os=Math.floor((st.points||0)/3),ns2=Math.floor(np/3);
    const sq=[...(st.squad||[])];
    for(let i=os;i<ns2&&sq.length<11;i++)sq.push(`p_${Date.now()}_${i}`);
    updateStudent(currentUser.id,{points:np,coins:nc,squad:sq});
  }

  function recordQuizAnswer(en,correct){
    const st=students.find(s=>s.id===currentUser.id);
    if(!st)return;
    updateStudent(currentUser.id,{history:[...(st.history||[]),{en,correct,source:"quiz"}]});
  }
  function recordHangmanAnswer(en,correct){
    const st=students.find(s=>s.id===currentUser.id);
    if(!st)return;
    updateStudent(currentUser.id,{history:[...(st.history||[]),{en,correct,source:"hangman"}],hangmanSessions:(st.hangmanSessions||0)});
  }

  if(!loaded)return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",gap:16}}>
      <div style={{fontSize:48}}>🎓</div>
      <div style={{fontSize:16,color:"var(--text2)"}}>Laster data...</div>
    </div>
  );

  if(!currentUser){
    if(!selecting)return(
      <div style={{maxWidth:380,margin:"0 auto",padding:"40px 16px",textAlign:"center"}}>
        <div style={{fontSize:48}}>🎓</div>
        <div style={{fontSize:22,fontWeight:500,marginTop:8}}>Glose-appen</div>
        <div style={{fontSize:14,color:"var(--text2)",marginTop:4,marginBottom:28}}>Hvem er du?</div>
        <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:24}}>
          {students.map(st=>(
            <button key={st.id} style={{padding:"14px 20px",borderRadius:14,border:"1px solid #ddd",background:"#fafafa",fontSize:16,cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:12}} onClick={()=>{setSelecting(st);setLoginError("");}}>
              <AvatarDisplay avatar={st.avatar} name={st.name} size={48}/>
              <div><div style={{fontWeight:500}}>{st.name}</div><div style={{fontSize:11,color:"#888"}}>{(st.club||CLUBS[0]).name} · 🪙 {st.coins||0}</div></div>
            </button>
          ))}
        </div>
        <button style={{width:"100%",padding:"12px",borderRadius:12,border:"1px solid #ddd",background:"#f5f5f5",color:"#888",fontSize:14,cursor:"pointer"}} onClick={()=>{setSelecting("admin");setLoginError("");}}>🔒 Admin / Lærer</button>
      </div>
    );
    if(selecting==="admin")return<PinPad title="Admin" subtitle="Admin PIN" error={loginError} onBack={()=>{setSelecting(null);setLoginError("");}} onSubmit={p=>{if(p===ADMIN_PIN){setCurrentUser("admin");setSelecting(null);setLoginError("");}else setLoginError("Feil PIN.");}}/>;
    return<PinPad title={selecting.name} subtitle="PIN-kode" error={loginError} onBack={()=>{setSelecting(null);setLoginError("");}} onSubmit={p=>{if(p===selecting.pin){setCurrentUser(selecting);setSelecting(null);setLoginError("");setScreen("home");}else setLoginError("Feil PIN.");}}/>;
  }

  if(currentUser==="admin")return<AdminPanel students={students} gloser={gloser} onSaveStudents={saveStudents} onSaveGloser={saveGloser} onBack={()=>setCurrentUser(null)}/>;

  const stData=students.find(s=>s.id===currentUser.id)||currentUser;
  const club=stData.club||CLUBS[0];

  if(showPenalty)return(
    <div style={s.page}>
      <div style={{textAlign:"center",padding:"20px 0 8px"}}><div style={{fontSize:26,fontWeight:500}}>⚽ Straffespark!</div></div>
      <PenaltyGame onDone={goals=>{const bonus=goals*2;addCoins(quizScore+bonus);setPenaltyResult({goals,bonus});setShowPenalty(false);}}/>
    </div>
  );

  if(penaltyResult)return(
    <div style={s.page}><div style={s.resultBox}>
      <AvatarDisplay avatar={stData.avatar} name={stData.name} size={90} coins={stData.coins} showCoins/>
      <div style={s.resultTitle}>Økt ferdig!</div>
      <div style={{fontSize:24,fontWeight:500,color:"#f9a825"}}>+{quizScore+penaltyResult.bonus} 🪙 coins!</div>
      <button style={s.bigBtn} onClick={()=>{setPenaltyResult(null);setScreen("shop");}}>🛒 Til butikken!</button>
      <button style={{...s.bigBtn,...s.btnGray}} onClick={()=>{setPenaltyResult(null);setScreen("home");}}>Hjem</button>
    </div></div>
  );

  if(screen==="hangman")return<HangmanGame gloser={gloser} onBack={()=>setScreen("home")} onCorrect={()=>addCoins(1)}/>;
  if(screen==="maths")return<MathMenu onBack={()=>setScreen("home")} addCoins={addCoins} onStart={()=>updateStudent(currentUser.id,{mathSessions:(stData.mathSessions||0)+1})}/>;
  if(screen==="leaderboard")return<Leaderboard students={students} onBack={()=>setScreen("home")}/>;
  if(screen==="shop")return<AvatarShop student={stData} onUpdate={u=>updateStudent(stData.id,u)} onBack={()=>setScreen("home")}/>;
  if(screen==="report"){const st=students.find(s=>s.id===currentUser.id);return<TeacherReport gloser={gloser} students={students} singleStudent={st.id} onBack={()=>setScreen("home")}/>;}
  if(screen==="squad")return(
    <div style={s.page}>
      <div style={s.topBar}><button style={s.back} onClick={()=>setScreen("home")}>← Hjem</button><span style={s.topTitle}>Mitt lag</span></div>
      <div style={{textAlign:"center",marginBottom:12}}>
        <div style={{fontSize:16,fontWeight:500}}>{club.name}</div>
        <div style={{fontSize:13,color:"#888"}}>{stData.squad?.length||0}/11 spillere</div>
      </div>
      <SquadDisplay squad={stData.squad||[]} clubColor={club.color}/>
    </div>
  );
  if(screen==="flashcard"){
    const card=fcDeck[fcIdx];
    const front=fcDir==="no→en"?card.no:card.en,back=fcDir==="no→en"?card.en:card.no;
    return(
      <div style={s.page}>
        <div style={s.topBar}><button style={s.back} onClick={()=>setScreen("home")}>← Hjem</button><span style={s.topTitle}>Flashcards</span><button style={s.smallBtn} onClick={()=>setFcDir(d=>d==="no→en"?"en→no":"no→en")}>{fcDir==="no→en"?"🇳🇴→🇬🇧":"🇬🇧→🇳🇴"}</button></div>
        <div style={s.progress}>{fcIdx+1}/{fcDeck.length}</div>
        <div style={{...s.card,cursor:"pointer"}} onClick={()=>setFcFlipped(f=>!f)}>
          <div style={s.cardLang}>{fcFlipped?(fcDir==="no→en"?"🇬🇧 Engelsk":"🇳🇴 Norsk"):(fcDir==="no→en"?"🇳🇴 Norsk":"🇬🇧 Engelsk")}</div>
          <div style={s.cardWord}>{fcFlipped?back:front}</div>
          {!fcFlipped&&<div style={s.cardHint}>Trykk for å snu</div>}
        </div>
        <div style={s.row}>
          <button style={s.navBtn} onClick={()=>{setFcIdx(i=>Math.max(0,i-1));setFcFlipped(false);}} disabled={fcIdx===0}>◀ Forrige</button>
          <button style={s.navBtn} onClick={()=>{
            if(fcIdx<fcDeck.length-1){setFcIdx(i=>i+1);setFcFlipped(false);addCoins(1);}
            else{addCoins(1);setScreen("home");}
          }}>{fcIdx<fcDeck.length-1?"Neste ▶ +🪙":"Ferdig ✓ +🪙"}</button>
        </div>
      </div>
    );
  }
  if(screen==="quiz"){
    if(quizDone)return(
      <div style={s.page}><div style={s.resultBox}>
        <div style={{fontSize:64}}>{quizScore===quizDeck.length?"🏆":quizScore>=quizDeck.length*0.7?"🌟":"💪"}</div>
        <div style={s.resultTitle}>Quiz ferdig!</div>
        <div style={s.resultScore}>{quizScore} av {quizDeck.length} riktige</div>
        <button style={{...s.bigBtn,background:"#e53935"}} onClick={()=>{setQuizDone(false);setShowPenalty(true);}}>⚽ Straffespark!</button>
        <button style={{...s.bigBtn,...s.btnGray}} onClick={()=>{addCoins(quizScore);setScreen("home");}}>Hjem (+{quizScore}🪙)</button>
      </div></div>
    );
    const q=quizDeck[quizIdx];
    const isNew=[...gloser].sort((a,b)=>b.id-a.id).slice(0,NEW_COUNT).some(g=>g.en===q.en);
    return(
      <div style={s.page}>
        <div style={s.topBar}><button style={s.back} onClick={()=>setScreen("home")}>← Hjem</button><span style={s.topTitle}>Quiz</span><span style={{fontSize:14,fontWeight:500}}>⭐{quizScore} 🪙{stData.coins||0}</span></div>
        <div style={s.progress}>{quizIdx+1}/{quizDeck.length}</div>
        <div style={s.questionBox}>
          {isNew&&<div style={{fontSize:11,background:"#fff3e0",color:"#e65100",borderRadius:6,padding:"2px 8px",display:"inline-block",marginBottom:8}}>Ny glose</div>}
          <div style={s.questionLabel}>Hva er engelsk for:</div>
          <div style={s.questionWord}>{q.no}</div>
        </div>
        <div style={s.choicesGrid}>
          {quizChoices.map((c,i)=>{
            let bg="#fff";
            if(quizAnswer!==null){if(c.en===q.en)bg="#d4f7d4";else if(c.en===quizAnswer)bg="#fdd";}
            return<button key={i} style={{...s.choice,background:bg}} onClick={()=>{
              if(quizAnswer!==null)return;
              const cor=quizDeck[quizIdx],ok=c.en===cor.en;
              setQuizAnswer(c.en);
              recordQuizAnswer(cor.en,ok);
              if(ok)setQuizScore(sc=>sc+1);
              setTimeout(()=>{
                const nx=quizIdx+1;
                if(nx>=quizDeck.length){
                  updateStudent(currentUser.id,{quizSessions:(stData.quizSessions||0)+1});
                  setQuizDone(true);
                }else{
                  setQuizIdx(nx);setQuizAnswer(null);
                  const nc=quizDeck[nx];setQuizChoices(shuffle([nc,...shuffle(gloser.filter(g=>g.en!==nc.en)).slice(0,3)]));
                }
              },900);
            }}>{c.en}</button>;
          })}
        </div>
      </div>
    );
  }

  function startFlashcards(){
    setFcDeck(shuffle(gloser));setFcIdx(0);setFcFlipped(false);setScreen("flashcard");
    updateStudent(currentUser.id,{flashcardSessions:(stData.flashcardSessions||0)+1});
  }
  function startQuiz(){const deck=buildQuizDeck(gloser);setQuizDeck(deck);setQuizIdx(0);setQuizScore(0);setQuizDone(false);setQuizAnswer(null);const f=deck[0];setQuizChoices(shuffle([f,...shuffle(gloser.filter(g=>g.en!==f.en)).slice(0,3)]));setScreen("quiz");}

  return(
    <div style={s.page}>
      {coinAnim&&<div style={{position:"fixed",top:80,right:20,fontSize:20,fontWeight:600,color:"#f9a825",animation:"coinPop 1s",zIndex:99,pointerEvents:"none"}}>{coinAnim}</div>}
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"16px 0 8px"}}>
        <div style={{cursor:"pointer"}} onClick={()=>setScreen("shop")}>
          <AvatarDisplay avatar={stData.avatar} name={stData.name} size={60} coins={stData.coins||0} showCoins/>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:17,fontWeight:500}}>Hei, {stData.name}! 👋</div>
          <div style={{fontSize:12,color:"var(--text3)"}}>{gloser.length} gloser · ⚽ {stData.points||0}p</div>
        </div>
        <button style={{background:"none",border:"1px solid #ddd",borderRadius:8,padding:"6px 10px",fontSize:12,color:"#888",cursor:"pointer"}} onClick={()=>setCurrentUser(null)}>Logg ut</button>
      </div>
      <div style={{background:club.bg,borderRadius:12,padding:"10px 14px",marginBottom:14,display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:22}}>⚽</span>
        <div style={{flex:1}}><div style={{color:"white",fontWeight:500,fontSize:13}}>{club.name}</div><div style={{color:"rgba(255,255,255,0.7)",fontSize:11}}>{stData.squad?.length||0}/11 spillere</div></div>
        <div style={{color:"white",fontSize:16,fontWeight:500}}>🪙 {stData.coins||0}</div>
      </div>
      <div style={s.menuGrid}>
        <button style={{...s.menuBtn,background:"#e3f2fd"}} onClick={startFlashcards}><span style={s.menuIcon}>🃏</span><span style={s.menuLabel}>Flashcards</span></button>
        <button style={{...s.menuBtn,background:"#f3e5f5"}} onClick={()=>gloser.length>=4?startQuiz():alert("Trenger minst 4 gloser!")}><span style={s.menuIcon}>🎯</span><span style={s.menuLabel}>Quiz</span></button>
        <button style={{...s.menuBtn,background:"#fce4ec"}} onClick={()=>setScreen("hangman")}><span style={s.menuIcon}>🪢</span><span style={s.menuLabel}>Hangman</span></button>
        <button style={{...s.menuBtn,background:"#e0f7fa"}} onClick={()=>setScreen("maths")}><span style={s.menuIcon}>✖️</span><span style={s.menuLabel}>Matte</span></button>
        <button style={{...s.menuBtn,background:"#fff8e1"}} onClick={()=>setScreen("shop")}><span style={s.menuIcon}>🛒</span><span style={s.menuLabel}>Butikk</span></button>
        <button style={{...s.menuBtn,background:"#e8f5e9"}} onClick={()=>setScreen("squad")}><span style={s.menuIcon}>⚽</span><span style={s.menuLabel}>Mitt lag</span></button>
        <button style={{...s.menuBtn,background:"#f9fbe7"}} onClick={()=>setScreen("leaderboard")}><span style={s.menuIcon}>🏆</span><span style={s.menuLabel}>Poengtavle</span></button>
      </div>
    </div>
  );
}

const s={
  page:{maxWidth:480,margin:"0 auto",padding:"0 16px 32px"},
  topBar:{display:"flex",alignItems:"center",padding:"16px 0 8px",gap:8},
  topTitle:{flex:1,textAlign:"center",fontWeight:500,fontSize:17},
  back:{background:"none",border:"none",cursor:"pointer",fontSize:14,color:"#555",padding:0},
  smallBtn:{background:"none",border:"1px solid #ccc",borderRadius:8,padding:"4px 8px",fontSize:12,cursor:"pointer"},
  progress:{textAlign:"center",fontSize:13,color:"var(--text3)",marginBottom:12},
  menuGrid:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginTop:4},
  menuBtn:{border:"none",borderRadius:16,padding:"18px 12px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:8},
  menuIcon:{fontSize:30},menuLabel:{fontSize:14,fontWeight:500},
  card:{background:"#fff",border:"1px solid #ddd",borderRadius:20,padding:"40px 24px",textAlign:"center",minHeight:160,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",margin:"0 0 20px"},
  cardLang:{fontSize:13,color:"var(--text3)",marginBottom:8},cardWord:{fontSize:36,fontWeight:500},cardHint:{fontSize:12,color:"#bbb",marginTop:16},
  row:{display:"flex",gap:12},navBtn:{flex:1,padding:"14px",borderRadius:12,border:"1px solid #ddd",background:"#f9f9f9",fontSize:15,cursor:"pointer"},
  questionBox:{background:"#f5f0ff",borderRadius:16,padding:"22px 20px",textAlign:"center",marginBottom:20},
  questionLabel:{fontSize:14,color:"var(--text2)",marginBottom:8},questionWord:{fontSize:34,fontWeight:500},
  choicesGrid:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10},
  choice:{padding:"18px 8px",borderRadius:12,border:"1px solid #ddd",fontSize:17,cursor:"pointer"},
  resultBox:{display:"flex",flexDirection:"column",alignItems:"center",gap:12,paddingTop:32},
  resultTitle:{fontSize:26,fontWeight:500},resultScore:{fontSize:18,color:"var(--text2)"},
  bigBtn:{width:"100%",padding:"14px",borderRadius:12,border:"none",background:"var(--purple)",color:"#fff",fontSize:16,cursor:"pointer",fontWeight:500},
  btnGray:{background:"#f0f0f0",color:"#333"},
  addBox:{display:"flex",flexDirection:"column",gap:10,marginBottom:20},
  input:{padding:"12px 14px",borderRadius:10,border:"1px solid #ccc",fontSize:16},
  gloseList:{display:"flex",flexDirection:"column",gap:8},
  gloseRow:{display:"flex",alignItems:"center",background:"#fafafa",borderRadius:10,padding:"10px 14px",border:"1px solid #eee"},
  glosePair:{flex:1,fontSize:15},deleteBtn:{background:"none",border:"none",color:"#ccc",fontSize:16,cursor:"pointer"},
  letterBox:{width:36,height:44,border:"1px solid #ccc",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,background:"#fafafa"},
  keyboard:{display:"flex",flexWrap:"wrap",gap:6,justifyContent:"center"},
  key:{width:36,height:40,border:"1px solid #ddd",borderRadius:8,fontSize:15,fontWeight:500},
  pinBtn:{padding:"16px",borderRadius:12,border:"1px solid #ddd",background:"#fafafa",fontSize:22,cursor:"pointer"},
  smallActionBtn:{padding:"8px 14px",borderRadius:8,border:"none",fontSize:13,cursor:"pointer",fontWeight:500},
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script></body></html>
